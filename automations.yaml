- id: 'ev_segment_start_on_charging'
  alias: EV - Segment start on charging
  description: Starter energisegment når fysisk opladning starter
  triggers:
    - trigger: numeric_state
      entity_id: sensor.eh45khwp_power
      above: 0.5
      for:
        seconds: 20
  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'
    - condition: state
      entity_id: input_boolean.ev_segment_open
      state: 'off'
  actions:
    - if:
        - condition: template
          value_template: >
            {{
              states('input_number.ev_session_energy_latched_kwh') | float(0) <= 0.05
              and states('sensor.eh45khwp_session_energy') | float(0) <= 0.05
            }}
      then:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ev_session_started_at
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_segment_started_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_start_energy_kwh
      data:
        value: "{{ states('sensor.eh45khwp_session_energy') | float(0) | round(2) }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_ampere
      data:
        value: >
          {% set eff = states('sensor.ev_target_ampere_effective') | int(0) %}
          {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
          {{ eff if eff >= min_amp else min_amp }}

    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_segment_open

    - action: logbook.log
      data:
        name: EV
        message: >
          Segment startet
          (amp={{ states('sensor.ev_target_ampere_effective') }} A,
          session_energy={{ states('sensor.eh45khwp_session_energy') }} kWh)
  mode: single


- id: 'ev_segment_close_on_ampere_change'
  alias: EV - Segment close on ampere change
  description: Logger energisegment når ampere ændres under aktiv opladning

  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_target_ampere_effective
      for:
        seconds: 10

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: numeric_state
      entity_id: sensor.eh45khwp_power
      above: 0.5

    - condition: state
      entity_id: input_boolean.ev_segment_open
      state: 'on'

    - condition: template
      value_template: >
        {{
          states('sensor.ev_target_ampere_effective') | int(0)
          !=
          states('input_number.ev_segment_ampere') | int(0)
        }}

  actions:

    - variables:
        segment_start_energy: "{{ states('input_number.ev_segment_start_energy_kwh') | float(0) }}"
        segment_end_energy: "{{ states('sensor.eh45khwp_session_energy') | float(0) }}"
        segment_kwh: "{{ [segment_end_energy - segment_start_energy, 0] | max | round(2) }}"
        old_ampere: "{{ states('input_number.ev_segment_ampere') | int(0) }}"
        new_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        started_at: "{{ states('input_datetime.ev_segment_started_at') }}"
        ended_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        mode: "{{ states('input_text.ev_session_mode_latched') }}"

    - if:
        - condition: template
          value_template: >
            {{ segment_kwh > 0.01 }}
      then:

        - if:
            - condition: template
              value_template: >
                {{ old_ampere == 0 }}
          then:
            - action: logbook.log
              data:
                name: EV Segment Warning
                message: >
                  0A segment med energi registreret:
                  {{ started_at }} → {{ ended_at }},
                  energy={{ segment_kwh }} kWh,
                  new_amp={{ new_ampere }} A

        - action: script.ev_log_segment_csv
          data:
            line: >-
              {{ [
                'segment_stop',
                started_at,
                ended_at,
                mode,
                old_ampere,
                segment_kwh,
                segment_end_energy | float(0) | round(2),
                states('input_number.ev_session_start_soc'),
                states('input_number.ev_session_target_soc'),
                states('input_number.ev_session_battery_kwh')
              ] | join(',') }}

        - action: input_text.set_value
          target:
            entity_id: input_text.ev_last_segment_summary
          data:
            value: >
              {{ started_at }} → {{ ended_at }}
              · mode={{ mode }}
              · amp={{ old_ampere }} A
              · energy={{ segment_kwh }} kWh

        - action: logbook.log
          data:
            name: EV Segment
            message: >
              {{ started_at }} → {{ ended_at }},
              mode={{ mode }},
              amp={{ old_ampere }} A,
              energy={{ segment_kwh }} kWh,
              session_energy={{ segment_end_energy }} kWh

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_segment_started_at
      data:
        datetime: "{{ ended_at }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_start_energy_kwh
      data:
        value: "{{ segment_end_energy | round(2) }}"

    - if:
        - condition: template
          value_template: >
            {{ new_ampere == 0 }}
      then:
        - action: logbook.log
          data:
            name: EV Segment Debug
            message: >
              Segment ampere sættes til 0 efter segment-close.
              old_ampere={{ old_ampere }},
              new_ampere={{ new_ampere }},
              segment_kwh={{ segment_kwh }},
              started_at={{ started_at }},
              ended_at={{ ended_at }},
              power={{ states('sensor.eh45khwp_power') }} kW,
              decision={{ states('sensor.ev_charge_decision') }},
              target_reason={{ state_attr('sensor.ev_target_ampere_raw', 'reason') }}

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_ampere
      data:
        value: "{{ new_ampere }}"

  mode: restart

- id: 'ev_session_metrics_initialize'
  alias: EV - Session metrics initialize
  description: >
    MODEL B - Initialiserer sessionstællere ved ny EV-session
    eller ved fysisk ladestart hvis session allerede var aktiv.
    Gemmer Easees energiværdi ved start, så HA-sessionens energi beregnes som delta.
  triggers:
    - trigger: state
      entity_id: input_boolean.ev_session_active
      to: 'on'
      id: session_activated

    - trigger: numeric_state
      entity_id: sensor.eh45khwp_power
      above: 0.5
      for:
        seconds: 20
      id: physical_charge_started

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: template
      value_template: >
        {% set trigger_id = trigger.id | default('') %}
        {% set latched = states('input_number.ev_session_energy_latched_kwh') | float(0) %}
        {% set easee_energy = states('sensor.eh45khwp_session_energy') | float(0) %}

        {{
          trigger_id == 'session_activated'
          or
          (
            trigger_id == 'physical_charge_started'
            and latched > 0.05
            and easee_energy <= 0.10
          )
        }}

  actions:
    - variables:
        trigger_reason: "{{ trigger.id | default('unknown') }}"
        old_latched_energy: "{{ states('input_number.ev_session_energy_latched_kwh') | float(0) | round(2) }}"
        easee_session_energy: "{{ states('sensor.eh45khwp_session_energy') | float(0) | round(2) }}"
        target_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        charge_mode: "{{ states('input_select.ev_charge_mode') }}"

        session_start_soc: >
          {% set vw_soc = states('sensor.battery_level') %}
          {% set manual_soc = states('input_number.ev_guest_planned_start_soc') %}
          {% if vw_soc not in ['unknown', 'unavailable', '', 'none'] %}
            {{ vw_soc | float(0) | round(1) }}
          {% else %}
            {{ manual_soc | float(0) | round(1) }}
          {% endif %}

        session_target_soc: >
          {% set vw_target = states('sensor.battery_target_charge_level') %}
          {% set manual_target = states('input_number.ev_guest_planned_target_soc') %}
          {% if vw_target not in ['unknown', 'unavailable', '', 'none'] %}
            {{ vw_target | float(80) | round(1) }}
          {% else %}
            {{ manual_target | float(80) | round(1) }}
          {% endif %}

        session_battery_kwh: "{{ states('input_number.ev_guest_planned_battery_kwh') | float(77) | round(1) }}"

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_session_logged

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_start_soc
      data:
        value: "{{ session_start_soc }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_target_soc
      data:
        value: "{{ session_target_soc }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_battery_kwh
      data:
        value: "{{ session_battery_kwh }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_energy_latched_kwh
      data:
        value: 0

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_easee_start_energy_kwh
      data:
        value: "{{ easee_session_energy }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_max_ampere
      data:
        value: "{{ target_ampere }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_start_energy_kwh
      data:
        value: "{{ easee_session_energy }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_ampere
      data:
        value: "{{ target_ampere }}"

    - action: input_text.set_value
      target:
        entity_id: input_text.ev_session_mode_latched
      data:
        value: "{{ charge_mode }}"

    - action: input_datetime.set_datetime
      target:
        entity_id:
          - input_datetime.ev_session_started_at
          - input_datetime.ev_segment_started_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: Session metrics initialiseret
          (trigger={{ trigger_reason }},
          mode={{ charge_mode }},
          amp={{ target_ampere }},
          start_soc={{ session_start_soc }},
          target_soc={{ session_target_soc }},
          battery={{ session_battery_kwh }} kWh,
          old_latched_energy={{ old_latched_energy }} kWh,
          easee_start_energy={{ easee_session_energy }} kWh)

  mode: single

- id: 'ev_session_energy_latch'
  alias: EV - Session energy latch
  description: >
    MODEL B - Gemmer højeste kendte leverede energi i HA-sessionen.
    Energi beregnes som delta mellem Easees aktuelle session energy
    og Easees session energy ved HA-sessionstart.
    Hvis Easee session energy nulstilles undervejs, nulstilles HA-referencepunktet også.
  triggers:
    - trigger: state
      entity_id:
        - sensor.eh45khwp_session_energy

    - trigger: state
      entity_id:
        - sensor.ev_target_ampere_effective

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

  actions:
    - variables:
        easee_current: "{{ states('sensor.eh45khwp_session_energy') | float(0) }}"
        easee_start: "{{ states('input_number.ev_session_easee_start_energy_kwh') | float(0) }}"
        old_latched: "{{ states('input_number.ev_session_energy_latched_kwh') | float(0) }}"
        easee_reset_detected: >
          {{
            states('sensor.eh45khwp_session_energy') | float(0)
            <
            states('input_number.ev_session_easee_start_energy_kwh') | float(0)
          }}
        delivered_delta: >
          {% set current = states('sensor.eh45khwp_session_energy') | float(0) %}
          {% set start = states('input_number.ev_session_easee_start_energy_kwh') | float(0) %}
          {% if current >= start %}
            {{ (current - start) | round(2) }}
          {% else %}
            {{ current | round(2) }}
          {% endif %}

    - if:
        - condition: template
          value_template: "{{ easee_reset_detected }}"
      then:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_session_easee_start_energy_kwh
          data:
            value: 0

    - if:
        - condition: template
          value_template: >
            {{ delivered_delta | float(0) > old_latched | float(0) }}
      then:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_session_energy_latched_kwh
          data:
            value: "{{ delivered_delta | float(0) | round(2) }}"

    - if:
        - condition: template
          value_template: >
            {{
              states('sensor.ev_target_ampere_effective') | int(0)
              >
              states('input_number.ev_session_max_ampere') | int(0)
            }}
      then:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_session_max_ampere
          data:
            value: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"

    - if:
        - condition: template
          value_template: "{{ easee_reset_detected }}"
      then:
        - action: logbook.log
          data:
            name: EV
            message: >
              MODEL B: Easee session energy reset detected.
              HA reference reset to 0
              (easee_current={{ easee_current }} kWh,
              old_easee_start={{ easee_start }} kWh,
              old_latched={{ old_latched }} kWh,
              delivered_delta={{ delivered_delta }} kWh)

  mode: restart

- id: 'ev_session_rebaseline_on_manual_start_soc_change'
  alias: EV - Session rebaseline on manual start SOC change
  description: >
    MODEL B - Når manuel start-SOC ændres mens VW SOC er unavailable,
    bruges den nye værdi straks som aktuel session-SOC.
    Sessionens leverede energi nulstilles, og Easee-referencepunktet flyttes til aktuel Easee session energy.
  triggers:
    - trigger: state
      entity_id: input_number.ev_guest_planned_start_soc

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: template
      value_template: >
        {{ states('sensor.battery_level') in ['unknown', 'unavailable', '', 'none'] }}

  actions:
    - variables:
        new_start_soc: "{{ states('input_number.ev_guest_planned_start_soc') | float(0) | round(1) }}"
        easee_current: "{{ states('sensor.eh45khwp_session_energy') | float(0) | round(2) }}"
        old_session_start_soc: "{{ states('input_number.ev_session_start_soc') | float(0) | round(1) }}"
        old_latched_energy: "{{ states('input_number.ev_session_energy_latched_kwh') | float(0) | round(2) }}"
        old_easee_start: "{{ states('input_number.ev_session_easee_start_energy_kwh') | float(0) | round(2) }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_start_soc
      data:
        value: "{{ new_start_soc }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_energy_latched_kwh
      data:
        value: 0

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_easee_start_energy_kwh
      data:
        value: "{{ easee_current }}"

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: Session rebaselined after manual start SOC change
          (old_start_soc={{ old_session_start_soc }},
          new_start_soc={{ new_start_soc }},
          old_latched_energy={{ old_latched_energy }} kWh,
          old_easee_start={{ old_easee_start }} kWh,
          new_easee_start={{ easee_current }} kWh)

  mode: restart  

# LEGACY / DISABLED
# Må ikke bruges: Easee nulstiller session_energy for sent.
# Beholdes kun som reference.
- id: 'ev_session_finalize_on_energy_reset'
  alias: EV - Session finalize on energy reset
  initial_state: false
  description: Afslutter EV-session når Easee Session Energy nulstilles efter aktiv session
  triggers:
    - trigger: numeric_state
      entity_id: sensor.eh45khwp_session_energy
      below: 0.01
      for:
        minutes: 1
  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'
    - condition: template
      value_template: >
        {{ states('input_number.ev_session_energy_latched_kwh') | float(0) > 0.05 }}
  actions:
    - variables:
        final_energy: "{{ states('input_number.ev_session_energy_latched_kwh') | float(0) }}"
        segment_start_energy: "{{ states('input_number.ev_segment_start_energy_kwh') | float(0) }}"
        segment_kwh: "{{ [final_energy - segment_start_energy, 0] | max | round(2) }}"
        old_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        started_at: "{{ states('input_datetime.ev_segment_started_at') }}"
        ended_at: >
          {% set finished = states('input_datetime.ev_session_finished_at') %}
          {% if finished not in ['unknown', 'unavailable', '', 'none'] %}
            {{ finished }}
          {% else %}
            {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
          {% endif %}
        session_started_at: "{{ states('input_datetime.ev_session_started_at') }}"
        mode: "{{ states('input_text.ev_session_mode_latched') }}"

    - if:
        - condition: state
          entity_id: input_boolean.ev_segment_open
          state: 'on'
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.ev_last_segment_summary
          data:
            value: >
              {{ started_at }} → {{ ended_at }}
              · mode={{ mode }}
              · amp={{ old_ampere }} A
              · energy={{ segment_kwh }} kWh

        - action: logbook.log
          data:
            name: EV Segment
            message: >
              Final segment:
              {{ started_at }} → {{ ended_at }},
              mode={{ mode }},
              amp={{ old_ampere }} A,
              energy={{ segment_kwh }} kWh

        - action: script.ev_log_segment_csv
          data:
            line: "{{ [
              'finalize_on_energy_reset_final_segment',
              started_at,
              ended_at,
              mode,
              old_ampere,
              segment_kwh,
              final_energy | round(2),
              states('input_number.ev_session_start_soc'),
              states('input_number.ev_session_target_soc'),
              states('input_number.ev_session_battery_kwh')
            ] | join(',') }}"

        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.ev_segment_open

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_finished_at
      data:
        datetime: "{{ ended_at }}"

    - action: input_text.set_value
      target:
        entity_id: input_text.ev_last_session_summary
      data:
        value: >
          {{ session_started_at }} → {{ ended_at }}
          · mode={{ mode }}
          · energy={{ final_energy | round(2) }} kWh
          · max_amp={{ states('input_number.ev_session_max_ampere') }} A

    - action: script.ev_log_session_csv
      data:
        line: "{{ [
          'session',
          session_started_at,
          ended_at,
          mode,
          final_energy | round(2),
          states('input_number.ev_session_max_ampere'),
          states('input_number.ev_session_start_soc'),
          states('input_number.ev_session_target_soc'),
          states('input_number.ev_session_battery_kwh')
        ] | join(',') }}"

    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.ev_session_active
          - input_boolean.ev_start_delay_active
          - input_boolean.ev_segment_open

    - if:
        - condition: template
          value_template: >
            {{ not is_state('sensor.ev_intellicharge_smart_status_2', 'Smart') }}
      then:
        - action: script.intellicharge_apply_smart

    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.intellicharge_overridden_by_ev

    - action: logbook.log
      data:
        name: EV
        message: >
          Session afsluttet
          (mode={{ mode }},
          energy={{ final_energy | round(2) }} kWh,
          max_amp={{ states('input_number.ev_session_max_ampere') }} A)

  mode: single

- id: 'ev_sync_session_target_with_car'
  alias: EV - Sync session target with car
  description: "MODEL B: VW target bruges kun som debug og overskriver ikke HA session target"

  triggers:
    - trigger: state
      entity_id:
        - sensor.battery_target_charge_level

    - trigger: state
      entity_id:
        - sensor.ev_effective_target_soc

    - trigger: homeassistant
      event: start

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

  actions:
    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: VW target observeret, men session target ændres ikke.
          (vw_target={{ states('sensor.battery_target_charge_level') }},
          effective_target={{ states('sensor.ev_effective_target_soc') }},
          session_target={{ states('input_number.ev_session_target_soc') }})

  mode: single

- id: 'ev_sun_optimized_latch_export'
  alias: EV - Sun Optimized latch export
  description: Gemmer sidste positive eksportværdi før inverteren lukker ned
  triggers:
    - trigger: state
      entity_id:
        - sensor.grid_export_power_average_2m_safe
  conditions:
    - condition: template
      value_template: >
        {{ states('sensor.grid_export_power_average_2m_safe') | float(0) > 0.2 }}
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_sun_optimized_latched_export_kw
      data:
        value: "{{ states('sensor.grid_export_power_average_2m_safe') | float(0) | round(2) }}"
  mode: restart

- id: 'ev_roll_ready_by_when_target_reached'
  alias: EV - Roll Ready By when target reached
  description: Rykker Ready By til næste dag kl. 09:00 når ønsket SOC er nået efter opladning

  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ev_session_complete
      to: 'on'
      for:
        minutes: 1

    - trigger: state
      entity_id:
        - sensor.ev_effective_soc
      for:
        minutes: 1

    - trigger: state
      entity_id:
        - sensor.ev_remaining_energy_live_kwh
      for:
        minutes: 1

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: template
      value_template: >
        {{
          states('input_number.ev_session_energy_latched_kwh') | float(0) > 0.05
        }}

    - condition: template
      value_template: >
        {{
          is_state('binary_sensor.ev_session_complete', 'on')
          or states('sensor.ev_remaining_energy_live_kwh') | float(999) <= 0.5
        }}

  actions:
    - variables:
        next_ready: "{{ (today_at('09:00:00') + timedelta(days=1)).strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_datetime.set_datetime
      target:
        entity_id:
          - input_datetime.ev_planned_ready_by
          - input_datetime.ev_session_ready_by
      data:
        datetime: "{{ next_ready }}"

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: Ready By rykket til {{ next_ready }} fordi sessionen er komplet
          efter opladning.
          (effective_soc={{ states('sensor.ev_effective_soc') }},
          target={{ states('sensor.ev_effective_target_soc') }},
          remaining={{ states('sensor.ev_remaining_energy_live_kwh') }} kWh,
          delivered={{ states('input_number.ev_session_energy_latched_kwh') }} kWh)

  mode: single

- id: 'ev_roll_ready_by_if_no_charge'
  alias: EV - Roll Ready By if no charge
  description: Rykker Ready By til næste dag kl. 09:00 hvis der ikke blev ladet inden deadline
  triggers:
    - trigger: time
      at: input_datetime.ev_session_ready_by

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: template
      value_template: >
        {{
          states('input_number.ev_session_energy_latched_kwh') | float(0) <= 0.05
          and states('sensor.eh45khwp_session_energy') | float(0) <= 0.05
          and states('sensor.eh45khwp_power') | float(0) <= 0.5
        }}

  actions:
    - variables:
        next_ready: "{{ (today_at('09:00:00') + timedelta(days=1)).strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_datetime.set_datetime
      target:
        entity_id:
          - input_datetime.ev_planned_ready_by
          - input_datetime.ev_session_ready_by
      data:
        datetime: "{{ next_ready }}"

    - action: logbook.log
      data:
        name: EV
        message: >
          Ready By rykket til {{ next_ready }} fordi der ikke blev ladet inden deadline.

  mode: single

- id: 'ev_refresh_car_soc_after_restart'
  alias: EV - Refresh car SOC after restart
  description: "MODEL B: Opdaterer VW-debug efter HA restart, men ændrer ikke HA's session-SOC"
  triggers:
    - trigger: homeassistant
      event: start

  actions:
    - delay: "00:00:45"

    # MODEL B: VW er kun debug/telemetry. Fejl her må ikke påvirke sessionens SOC.
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.battery_level
          - sensor.battery_target_charge_level

    - delay: "00:00:15"

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B efter restart:
          VW forsøgt opdateret som debug
          (vw_soc={{ states('sensor.battery_level') }},
          vw_target={{ states('sensor.battery_target_charge_level') }},
          effective_soc={{ states('sensor.ev_effective_soc') }},
          effective_target={{ states('sensor.ev_effective_target_soc') }},
          calculated_soc={{ states('sensor.ev_calculated_soc') }})

  mode: single

- id: 'ev_segment_close_on_charging_stop'
  alias: EV - Segment close on charging stop
  description: Lukker aktuelt energisegment når fysisk ladeeffekt stopper
  triggers:
    - trigger: numeric_state
      entity_id: sensor.eh45khwp_power
      below: 0.5
      for:
        minutes: 3

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_segment_open
      state: 'on'

  actions:
    - variables:
        segment_start_energy: "{{ states('input_number.ev_segment_start_energy_kwh') | float(0) }}"
        segment_end_energy: "{{ states('sensor.eh45khwp_session_energy') | float(0) }}"
        segment_kwh: "{{ [segment_end_energy - segment_start_energy, 0] | max | round(2) }}"
        old_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        started_at: "{{ states('input_datetime.ev_segment_started_at') }}"
        ended_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        mode: "{{ states('input_text.ev_session_mode_latched') }}"

    - if:
        - condition: template
          value_template: "{{ segment_kwh >= 0.2 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.ev_last_segment_summary
          data:
            value: >
              {{ started_at }} → {{ ended_at }}
              · mode={{ mode }}
              · amp={{ old_ampere }} A
              · energy={{ segment_kwh }} kWh

        - action: script.ev_log_segment_csv
          data:
            line: >-
              {{ [
                'close_on_charging_stop_segment_stop',
                started_at,
                ended_at,
                mode,
                old_ampere,
                segment_kwh,
                segment_end_energy | float(0) | round(2),
                states('input_number.ev_session_start_soc'),
                states('input_number.ev_session_target_soc'),
                states('input_number.ev_session_battery_kwh')
              ] | join(',') }}

        - action: logbook.log
          data:
            name: EV Segment
            message: >
              Segment lukket ved stop:
              {{ started_at }} → {{ ended_at }},
              mode={{ mode }},
              amp={{ old_ampere }} A,
              energy={{ segment_kwh }} kWh
      else:
        - action: logbook.log
          data:
            name: EV Segment
            message: >
              Ignoreret støjsegment:
              {{ started_at }} → {{ ended_at }},
              mode={{ mode }},
              amp={{ old_ampere }} A,
              energy={{ segment_kwh }} kWh

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_segment_open

  mode: single

- id: 'ev_init_session_when_ready'
  alias: EV - Init session when ready
  description: "MODEL B: Initialiserer EV-session ud fra HA/effective data, ikke direkte VW-data"

  triggers:
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
        - input_boolean.ev_ha_control_enabled
        - binary_sensor.ev_cable_connected_effective
        - input_number.ev_guest_planned_start_soc
        - input_number.ev_guest_planned_target_soc
        - input_number.ev_guest_planned_battery_kwh

    - trigger: homeassistant
      event: start

  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'off'

    - condition: template
      value_template: >
        {{ states('input_select.ev_charge_mode') in
           ['Auto', 'Charge Now', 'Sun Optimized', 'Monta Guest'] }}

    - condition: template
      value_template: >
        {{ states('sensor.ev_remaining_energy_live_kwh') | float(0) > 0.5 }}

  actions:
    - variables:
        mode: "{{ states('input_select.ev_charge_mode') }}"
        started_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

        start_soc: "{{ states('sensor.ev_effective_soc') | float(0) }}"
        target_soc: "{{ states('sensor.ev_effective_target_soc') | float(80) }}"
        battery_kwh: "{{ states('input_number.ev_guest_planned_battery_kwh') | float(77) }}"

    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.ev_segment_open
          - input_boolean.ev_start_delay_active

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_started_at
      data:
        datetime: "{{ started_at }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_segment_started_at
      data:
        datetime: "{{ started_at }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_ready_by
      data:
        datetime: "{{ states('input_datetime.ev_planned_ready_by') }}"

    - action: input_text.set_value
      target:
        entity_id: input_text.ev_session_mode_latched
      data:
        value: "{{ mode }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_start_soc
      data:
        value: "{{ start_soc }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_target_soc
      data:
        value: "{{ target_soc }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_battery_kwh
      data:
        value: "{{ battery_kwh }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_energy_latched_kwh
      data:
        value: 0

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_max_ampere
      data:
        value: 0

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_start_energy_kwh
      data:
        value: "{{ states('sensor.eh45khwp_session_energy') | float(0) | round(2) }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.ev_segment_ampere
      data:
        value: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"

    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_session_active

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: Session initialiseret
          (mode={{ mode }},
          start_soc={{ start_soc }},
          target_soc={{ target_soc }},
          battery={{ battery_kwh }} kWh,
          ready_by={{ states('input_datetime.ev_session_ready_by') }},
          vw_soc={{ states('sensor.battery_level') }},
          vw_target={{ states('sensor.battery_target_charge_level') }})

  mode: single

- id: 'ev_session_finish_on_logical_stop'
  alias: EV - Session finish on logical stop
  description: >
    MODEL B - Afslutter EV-session ved logisk stop.
    Skriver session CSV én gang, men nulstiller altid sessionflag når sessionen er færdig.
  triggers:
    - trigger: state
      entity_id: binary_sensor.ev_session_complete
      to: 'on'
      for:
        minutes: 1

    - trigger: state
      entity_id: input_select.ev_charge_mode
      to: 'Stop'

    - trigger: state
      entity_id: binary_sensor.charging_cable_connected
      to: 'off'

    - trigger: state
      entity_id: input_boolean.ev_ha_control_enabled
      to: 'off'

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

  actions:
    - variables:
        ended_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        started_at: "{{ states('input_datetime.ev_session_started_at') }}"
        mode: "{{ states('input_text.ev_session_mode_latched') }}"
        energy: "{{ states('input_number.ev_session_energy_latched_kwh') | float(0) | round(2) }}"
        already_logged: "{{ is_state('input_boolean.ev_session_logged', 'on') }}"
        has_energy: "{{ states('input_number.ev_session_energy_latched_kwh') | float(0) > 0.05 }}"

    - if:
        - condition: template
          value_template: >
            {{ not already_logged and has_energy }}
      then:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ev_session_finished_at
          data:
            datetime: "{{ ended_at }}"

        - action: script.ev_log_session_csv
          data:
            line: "{{ [
              'session',
              started_at,
              ended_at,
              mode,
              energy,
              states('input_number.ev_session_max_ampere'),
              states('input_number.ev_session_start_soc'),
              states('input_number.ev_session_target_soc'),
              states('input_number.ev_session_battery_kwh')
            ] | join(',') }}"

        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.ev_session_logged

    - action: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.ev_session_active
          - input_boolean.ev_start_delay_active
          - input_boolean.ev_segment_open

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: Session afsluttet
          (trigger={{ trigger.entity_id }},
          mode={{ mode }},
          energy={{ energy }} kWh,
          csv_logged={{ not already_logged and has_energy }},
          session_logged_before={{ already_logged }},
          start={{ started_at }},
          end={{ ended_at }})

  mode: single

- id: 'ev_segment_close_on_manual_stop'
  alias: EV - Segment close on manual stop
  description: Lukker åbent segment straks når EV mode sættes til Stop
  triggers:
    - trigger: state
      entity_id: input_select.ev_charge_mode
      to: 'Stop'

  conditions:
    - condition: state
      entity_id: input_boolean.ev_segment_open
      state: 'on'

  actions:
    - variables:
        segment_start_energy: "{{ states('input_number.ev_segment_start_energy_kwh') | float(0) }}"
        segment_end_energy: "{{ states('sensor.eh45khwp_session_energy') | float(0) }}"
        segment_kwh: "{{ [segment_end_energy - segment_start_energy, 0] | max | round(2) }}"
        old_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        started_at: "{{ states('input_datetime.ev_segment_started_at') }}"
        ended_at: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        mode: "{{ states('input_text.ev_session_mode_latched') }}"

    - action: script.ev_log_segment_csv
      data:
        line: >-
          {{ [
            'close_on_manual_stop_segment_manual_stop',
            started_at,
            ended_at,
            mode,
            old_ampere,
            segment_kwh,
            segment_end_energy | float(0) | round(2),
            states('input_number.ev_session_start_soc'),
            states('input_number.ev_session_target_soc'),
            states('input_number.ev_session_battery_kwh')
          ] | join(',') }}

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_segment_open

  mode: single    

- id: 'ev_retry_start_when_waiting_for_authorization'
  alias: EV - Retry start when waiting for authorization
  description: Genstarter start hvis Easee hænger i Venter på godkendelse
  initial_state: false  # This disables the Automation
  triggers:
    - trigger: state
      entity_id: sensor.eh45khwp_status
      to: 'Venter på godkendelse'
      for:
        minutes: 3

  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: binary_sensor.ev_cable_connected_effective
      state: 'on'

    - condition: state
      entity_id: sensor.ev_charge_decision
      state: 'LAD'

    - condition: template
      value_template: >
        {{ states('sensor.eh45khwp_power') | float(0) < 0.5 }}

    - condition: template
      value_template: >
        {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
        {{ states('sensor.ev_target_ampere_effective') | int(0) >= min_amp }}

  actions:
    - action: logbook.log
      data:
        name: EV
        message: >
          Watchdog retry:
          status={{ states('sensor.eh45khwp_status') }},
          reason={{ states('sensor.eh45khwp_reason_for_no_current') }},
          power={{ states('sensor.eh45khwp_power') }},
          amp={{ states('sensor.ev_target_ampere_effective') }}

    - action: script.ev_charge_start

  mode: single  

- id: 'update_esp32_weather_display'
  alias: "Update ESP32 Weather Display"
  description: "Sends weather data to ESP32 display"

  trigger:
    - platform: state
      entity_id: weather.forecast_home

    - platform: time_pattern
      minutes: "/5"

    - platform: homeassistant
      event: start

  condition: []

  action:
    - service: esphome.ha_voice_waveshare_set_weather
      data:
        temperature: >
          {{ state_attr('weather.forecast_home', 'temperature') | round(0) }}°C

        condition: >
          {{ states('weather.forecast_home') | replace('_', ' ') | title }}

  mode: single

- id: 'ev_debug_segment_ampere_zero'
  alias: EV Debug - Segment ampere set to zero
  description: Logger når segment-ampere bliver 0 under aktiv session
  triggers:
    - trigger: state
      entity_id: input_number.ev_segment_ampere
      to: '0.0'
    - trigger: state
      entity_id: input_number.ev_segment_ampere
      to: '0'

  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

  actions:
    - action: logbook.log
      data:
        name: EV Segment Debug
        message: >
          ev_segment_ampere blev sat til 0.
          target_effective={{ states('sensor.ev_target_ampere_effective') }} A,
          target_raw={{ states('sensor.ev_target_ampere_raw') }} A,
          power={{ states('sensor.eh45khwp_power') }} kW,
          session_energy={{ states('sensor.eh45khwp_session_energy') }} kWh,
          segment_start_energy={{ states('input_number.ev_segment_start_energy_kwh') }} kWh,
          segment_started_at={{ states('input_datetime.ev_segment_started_at') }},
          decision={{ states('sensor.ev_charge_decision') }},
          mode={{ states('input_select.ev_charge_mode') }},
          reason={{ state_attr('sensor.ev_target_ampere_raw', 'reason') }}

  mode: restart