- id: '1775146735717'
  alias: Systemtilstand
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.eh45khwp_status
      to: 'Venter på godkendelse'
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Auto'
          sequence:
            - action: input_boolean.turn_on
              metadata: {}
              target:
                entity_id: input_boolean.ev_ha_control_enabled
              data: {}
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Charge Now'
          sequence: []
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Monta Guest'
          sequence: []
  mode: single

- id: 'ev_init_defaults_at_startup'
  alias: EV - Init defaults at startup
  description: ''
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_guest_planned_target_soc
      data:
        value: 80
    - action: input_select.select_option
      target:
        entity_id: input_select.ev_guest_target_quick
      data:
        option: "80"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_guest_planned_battery_kwh
      data:
        value: 77
    - action: input_datetime.set_datetime
      metadata: {}
      target:
        entity_id: input_datetime.ev_planned_ready_by
      data:
        datetime: "{{ today_at('09:00:00').strftime('%Y-%m-%d %H:%M:%S') if now() < today_at('09:00:00') else (today_at('09:00:00') + timedelta(days=1)).strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: 'ev_start_session_on_cable_connect'
  alias: EV - Start session on cable connect
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.charging_cable_connected
      to: 'on'
  conditions: []
  actions:
    - action: input_datetime.set_datetime
      metadata: {}
      target:
        entity_id: input_datetime.ev_session_ready_by
      data:
        datetime: "{{ states('input_datetime.ev_planned_ready_by') }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_session_target_soc
      data:
        value: "{{ states('input_number.ev_guest_planned_target_soc') | float(80) }}"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_session_start_soc
      data:
        value: "{{ states('sensor.battery_level') | float(0) }}"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_session_target_soc
      data:
        value: "{{ states('sensor.battery_target_charge_level') | float(80) }}"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_session_battery_kwh
      data:
        value: 77
    - action: input_boolean.turn_on
      metadata: {}
      target:
        entity_id: input_boolean.ev_session_active
      data: {}
  mode: single

- id: 'ev_start_charging_stable'
  alias: EV - Start charging stable
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'LAD'
      for:
        hours: 0
        minutes: 5
        seconds: 0
  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'
    - condition: state
      entity_id: binary_sensor.charging_cable_connected
      state: 'on'  
  actions:
    - action: script.ev_charge_start
      metadata: {}
      data: {}
    - action: logbook.log
      data:
        name: EV
        message: >
          Startet (mode={{ states('input_select.ev_charge_mode') }},
          decision={{ states('sensor.ev_charge_decision') }},
          amp={{ states('sensor.ev_target_ampere_effective') }})  
  mode: single
  
- id: 'ev_stop_charging_stable'
  alias: EV - Stop charging stable
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'VENT'
      for:
        hours: 0
        minutes: 15
        seconds: 0
  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: input_select.ev_charge_mode
      state: 'Auto'

    - condition: state
      entity_id: binary_sensor.charging_cable_connected
      state: 'on'

  actions:
    - action: script.ev_charge_stop
      metadata: {}
      data: {}
    - action: logbook.log
      data:
        name: EV
        message: >
         Stoppet (decision={{ states('sensor.ev_charge_decision') }})  
  mode: single
  
- id: 'ev_control_reduced_ac_charging'
  alias: EV - Control reduced AC charging
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_charge_power_mode
  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: sensor.ev_charge_power_mode
              state: 'FULL'
          sequence:
            - action: switch.turn_off
              metadata: {}
              target:
                entity_id: switch.reduced_ac_charging
              data: {}

        - conditions:
            - condition: state
              entity_id: sensor.ev_charge_power_mode
              state: 'REDUCED'
          sequence:
            - action: switch.turn_on
              metadata: {}
              target:
                entity_id: switch.reduced_ac_charging
              data: {}

        - conditions:
            - condition: state
              entity_id: sensor.ev_charge_power_mode
              state: 'STOP'
          sequence:
            - action: script.ev_charge_stop
              metadata: {}
              data: {}
  mode: single
  
- id: 'ev_guest_target_sync'
  alias: EV - Guest target sync (80/100)
  description: Sync quick target til rigtig target
  triggers:
    - trigger: state
      entity_id:
        - input_select.ev_guest_target_quick
  conditions: []
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_guest_planned_target_soc
      data:
        value: "{{ states('input_select.ev_guest_target_quick') | int }}"
  mode: single
  
- id: 'ev_guest_target_toggle_sync'
  alias: EV - Guest target toggle sync
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.ev_guest_target_100

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.ev_guest_target_100
              state: 'on'
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.ev_guest_planned_target_soc
              data:
                value: 100
      default:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_guest_planned_target_soc
          data:
            value: 80

  mode: single
  
- id: 'ev_sync_mode_and_ha_control'
  alias: EV - Sync mode and HA control
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Stop'
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Auto'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Charge Now'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Monta Guest'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled
  mode: single
  
- id: 'ev_sync_planned_to_session_when_idle'
  alias: EV - Sync planned ready time to session when idle
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - input_datetime.ev_planned_ready_by
  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'off'
  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_ready_by
      data:
        datetime: "{{ states('input_datetime.ev_planned_ready_by') }}"
  mode: single

- id: 'ev_apply_target_ampere'
  alias: EV - Apply target ampere
  description: Sender beregnet ampere til Easee når målet ændrer sig og opladning er aktiv/relevant
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_target_ampere_effective
      for:
        minutes: 15

    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'LAD'
      for:
        minutes: 1

    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to:
        - Charge Now
        - Auto
        - Monta Guest
      for:
        seconds: 10

  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: binary_sensor.charging_cable_connected
      state: 'on'

    - condition: template
      value_template: >
        {{ states('sensor.ev_charge_decision') == 'LAD'
           or states('input_select.ev_charge_mode') == 'Charge Now' }}

  actions:
    - action: script.ev_set_target_ampere

  mode: restart  

- id: 'intellicharge_acquire_ev_override'
  alias: IntelliCharge - Acquire EV Override
  description: EV overtager IntelliCharge kun når negativ pris + aktiv ladning kræver det
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ev_should_force_intellicharge_allow
      to: 'on'
      for:
        seconds: 30

  conditions:
    - condition: state
      entity_id: input_boolean.intellicharge_overridden_by_ev
      state: 'off'

    - condition: state
      entity_id: sensor.ev_intellicharge_smart_status_2
      state:
        - Smart
        - Allow Always

  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.intellicharge_pre_ev_mode
      data:
        option: "{{ states('sensor.ev_intellicharge_smart_status_2') }}"

    

    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.intellicharge_overridden_by_ev

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.intellicharge_override_started_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - if:
        - condition: not
          conditions:
            - condition: state
              entity_id: sensor.ev_intellicharge_smart_status_2
              state: 'Allow Always'
      then:
        - action: script.intellicharge_apply_allow

    - action: logbook.log
      data:
        name: IntelliCharge
        message: >
          Sat til {{ states('sensor.ev_intellicharge_smart_status_2') }}        

  mode: single  

- id: 'intellicharge_release_ev_override'
  alias: IntelliCharge - Release EV Override
  description: Gendan kun IntelliCharge hvis EV tidligere har overtaget den
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ev_should_force_intellicharge_allow
      to: 'off'
      for:
        minutes: 2

    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Stop'

  conditions:
    - condition: state
      entity_id: input_boolean.intellicharge_overridden_by_ev
      state: 'on'

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.intellicharge_pre_ev_mode
              state: 'Smart'
          sequence:
            - action: script.intellicharge_apply_smart

        - conditions:
            - condition: state
              entity_id: input_select.intellicharge_pre_ev_mode
              state: 'Allow Always'
          sequence:
            - action: script.intellicharge_apply_allow

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.intellicharge_overridden_by_ev

  mode: single

- id: 'intellicharge_recover_after_restart'
  alias: IntelliCharge - Recover after restart
  description: Genskab eller frigiv EV override efter restart
  triggers:
    - trigger: homeassistant
      event: start

  conditions: []

  actions:
    - delay: "00:00:30"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.intellicharge_overridden_by_ev
              state: 'on'
            - condition: state
              entity_id: binary_sensor.ev_should_force_intellicharge_allow
              state: 'on'
          sequence:
            - if:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: sensor.ev_intellicharge_smart_status_2
                      state: 'Allow Always'
              then:
                - action: script.intellicharge_apply_allow

                - action: logbook.log
                  data:
                    name: IntelliCharge
                    message: >
                      Recovery: beholdt/reetablerede Allow Always efter restart

        - conditions:
            - condition: state
              entity_id: input_boolean.intellicharge_overridden_by_ev
              state: 'on'
            - condition: state
              entity_id: binary_sensor.ev_should_force_intellicharge_allow
              state: 'off'
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: input_select.intellicharge_pre_ev_mode
                      state: 'Smart'
                  sequence:
                    - action: script.intellicharge_apply_smart

                    - action: logbook.log
                      data:
                        name: IntelliCharge
                        message: >
                          Recovery: gendannede Smart efter restart

                - conditions:
                    - condition: state
                      entity_id: input_select.intellicharge_pre_ev_mode
                      state: 'Allow Always'
                  sequence:
                    - action: script.intellicharge_apply_allow

                    - action: logbook.log
                      data:
                        name: IntelliCharge
                        message: >
                          Recovery: gendannede Allow Always efter restart

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.intellicharge_overridden_by_ev

  mode: single

- id: ev_intellicharge_acquire
  alias: EV - IntelliCharge Acquire
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.ev_intellicharge_override_needed
      to: "on"
      for: "00:01:00"

  condition:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: "on"

    - condition: template
      value_template: >
        {{ not is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}

  action:
    - service: script.intellicharge_apply_allow

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_intellicharge_settling

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_intellicharge_last_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"  

- id: ev_intellicharge_release
  alias: EV - IntelliCharge Release
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.ev_intellicharge_override_needed
      to: "off"
      for: "00:03:00"

  condition:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: "on"

    - condition: template
      value_template: >
        {{ is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}

  action:
    - service: script.intellicharge_apply_smart

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_intellicharge_settling

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_intellicharge_last_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

- id: ev_intellicharge_settling_clear
  alias: EV - IntelliCharge Settling Clear
  mode: restart

  trigger:
    - platform: state
      entity_id: input_boolean.ev_intellicharge_settling
      to: "on"

  action:
    - delay: "00:03:00"

    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_intellicharge_settling

- id: ev_ha_control_disabled_failsafe
  alias: EV - HA Control Disabled Failsafe
  mode: single

  trigger:
    - platform: state
      entity_id: input_boolean.ev_ha_control_enabled
      to: "off"

  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_intellicharge_settling

    - if:
        - condition: template
          value_template: >
            {{ is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}
      then:
        - service: script.intellicharge_apply_smart