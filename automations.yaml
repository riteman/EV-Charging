- id: '1775146735717'
  alias: Systemtilstand
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.eh45khwp_status
      to: 'Venter på godkendelse'
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Auto'
          sequence:
            - action: input_boolean.turn_on
              metadata: {}
              target:
                entity_id: input_boolean.ev_ha_control_enabled
              data: {}
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Charge Now'
          sequence: []
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Monta Guest'
          sequence: []
  mode: single

- id: 'ev_init_defaults_at_startup'
  alias: EV - Init defaults at startup
  description: ''
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_guest_planned_target_soc
      data:
        value: 80
    - action: input_select.select_option
      target:
        entity_id: input_select.ev_guest_target_quick
      data:
        option: "80"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_guest_planned_battery_kwh
      data:
        value: 77
    - action: input_datetime.set_datetime
      metadata: {}
      target:
        entity_id: input_datetime.ev_planned_ready_by
      data:
        datetime: "{{ today_at('09:00:00').strftime('%Y-%m-%d %H:%M:%S') if now() < today_at('09:00:00') else (today_at('09:00:00') + timedelta(days=1)).strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: 'ev_start_session_on_cable_connect'
  alias: EV - Start session on cable connect
  description: "MODEL B: Ved kabeltilslutning opdateres Ready By; session init håndteres af ev_init_session_when_ready"

  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.charging_cable_connected
      to: 'on'

    - trigger: state
      entity_id:
        - binary_sensor.ev_cable_connected_effective
      to: 'on'

  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_ready_by
      data:
        datetime: "{{ states('input_datetime.ev_planned_ready_by') }}"

    - action: logbook.log
      data:
        name: EV
        message: >
          MODEL B: Kabeltilslutning registreret.
          Ready By sat til {{ states('input_datetime.ev_session_ready_by') }}.
          Session-init overlades til ev_init_session_when_ready.

  mode: single

- id: 'ev_start_charging_stable'
  alias: EV - Start charging stable
  description: Starter opladning når EV decision er LAD, men kun når bilen er tilsluttet/afventer godkendelse
  triggers:
    - trigger: state
      entity_id: sensor.ev_charge_decision
      to: 'LAD'
      for:
        minutes: 2

    - trigger: state
      entity_id: input_boolean.ev_session_active
      to: 'on'

    - trigger: state
      entity_id: input_boolean.ev_ha_control_enabled
      to: 'on'

    - trigger: state
      entity_id: input_select.ev_charge_mode
      to:
        - 'Auto'
        - 'Charge Now'
        - 'Monta Guest'
        - 'Sun Optimized'

    - trigger: homeassistant
      event: start

  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: sensor.ev_charge_decision
      state: 'LAD'

    - condition: template
      value_template: >
        {{ states('sensor.ev_target_ampere_effective') | int(0)
           >= states('input_number.ev_min_charge_ampere') | int(7) }}

    - condition: template
      value_template: >
        {{ states('sensor.eh45khwp_power') | float(0) < 0.5 }}

    - condition: template
      value_template: >
        {{ states('sensor.eh45khwp_status') not in [
          'Bilen er koblet fra',
          'Car disconnected',
          'Disconnected'
        ] }}

  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_start_delay_active

    - delay: "00:02:00"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.ev_ha_control_enabled
              state: 'on'

            - condition: state
              entity_id: input_boolean.ev_session_active
              state: 'on'

            - condition: state
              entity_id: sensor.ev_charge_decision
              state: 'LAD'

            - condition: template
              value_template: >
                {{ states('sensor.ev_target_ampere_effective') | int(0)
                   >= states('input_number.ev_min_charge_ampere') | int(7) }}

            - condition: template
              value_template: >
                {{ states('sensor.eh45khwp_power') | float(0) < 0.5 }}

            - condition: template
              value_template: >
                {{ states('sensor.eh45khwp_status') not in [
                  'Bilen er koblet fra',
                  'Car disconnected',
                  'Disconnected'
                ] }}

          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ev_start_delay_active

            - action: script.ev_charge_start

            - action: logbook.log
              data:
                name: EV
                message: >
                  Startet
                  (mode={{ states('input_select.ev_charge_mode') }},
                  decision={{ states('sensor.ev_charge_decision') }},
                  amp={{ states('sensor.ev_target_ampere_effective') }},
                  status={{ states('sensor.eh45khwp_status') }},
                  reason={{ states('sensor.eh45khwp_reason_for_no_current') }})

      default:
        - action: logbook.log
          data:
            name: EV
            message: >
              Start annulleret efter delay
              (mode={{ states('input_select.ev_charge_mode') }},
              decision={{ states('sensor.ev_charge_decision') }},
              amp={{ states('sensor.ev_target_ampere_effective') }},
              session={{ states('input_boolean.ev_session_active') }},
              power={{ states('sensor.eh45khwp_power') }},
              status={{ states('sensor.eh45khwp_status') }})

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_start_delay_active

  mode: single

- id: ev_start_delay_off_when_not_lad
  alias: EV - Start delay off when not LAD
  triggers:
    - trigger: state
      entity_id: sensor.ev_charge_decision

  conditions:
    - condition: template
      value_template: "{{ states('sensor.ev_charge_decision') != 'LAD' }}"

  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_start_delay_active

  mode: restart  

  
- id: 'ev_stop_charging_stable'
  alias: EV - Stop charging stable
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'VENT'
      for:
        hours: 0
        minutes: 15
        seconds: 0
  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: input_select.ev_charge_mode
      state: 'Auto'

    - condition: state
      entity_id: binary_sensor.charging_cable_connected
      state: 'on'

  actions:
    - action: script.ev_charge_stop
      metadata: {}
      data: {}
    - action: logbook.log
      data:
        name: EV
        message: >
         Stoppet (decision={{ states('sensor.ev_charge_decision') }})  
  mode: single
  
- id: 'ev_control_reduced_ac_charging'
  alias: EV - Control reduced AC charging
  description: 'Obsolete legacy flow disabled because charger ampere is now controlled directly via Easee'
  triggers: []
  conditions: []
  actions: []
  mode: single
  
- id: 'ev_guest_target_sync'
  alias: EV - Guest target sync (80/100)
  description: Sync quick target til rigtig target
  triggers:
    - trigger: state
