- id: '1775146735717'
  alias: Systemtilstand
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.eh45khwp_status
      to: 'Venter på godkendelse'
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Auto'
          sequence:
            - action: input_boolean.turn_on
              metadata: {}
              target:
                entity_id: input_boolean.ev_ha_control_enabled
              data: {}
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Charge Now'
          sequence: []
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Monta Guest'
          sequence: []
  mode: single

- id: 'ev_init_defaults_at_startup'
  alias: EV - Init defaults at startup
  description: ''
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_guest_planned_target_soc
      data:
        value: 80
    - action: input_select.select_option
      target:
        entity_id: input_select.ev_guest_target_quick
      data:
        option: "80"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ev_guest_planned_battery_kwh
      data:
        value: 77
    - action: input_datetime.set_datetime
      metadata: {}
      target:
        entity_id: input_datetime.ev_planned_ready_by
      data:
        datetime: "{{ today_at('09:00:00').strftime('%Y-%m-%d %H:%M:%S') if now() < today_at('09:00:00') else (today_at('09:00:00') + timedelta(days=1)).strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: 'ev_start_session_on_cable_connect'
  alias: EV - Start session on cable connect
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.charging_cable_connected
      to: 'on'
    - trigger: state
      entity_id:
        - binary_sensor.ev_cable_connected_effective
      to: 'on'
  conditions: []
  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_ready_by
      data:
        datetime: "{{ states('input_datetime.ev_planned_ready_by') }}"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Monta Guest'
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.ev_session_start_soc
              data:
                value: "{{ states('input_number.ev_guest_planned_start_soc') | float(0) }}"

            - action: input_number.set_value
              target:
                entity_id: input_number.ev_session_target_soc
              data:
                value: "{{ states('input_number.ev_guest_planned_target_soc') | float(80) }}"

            - action: input_number.set_value
              target:
                entity_id: input_number.ev_session_battery_kwh
              data:
                value: "{{ states('input_number.ev_guest_planned_battery_kwh') | float(77) }}"

      default:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_session_start_soc
          data:
            value: "{{ states('sensor.battery_level') | float(0) }}"

        - action: input_number.set_value
          target:
            entity_id: input_number.ev_session_target_soc
          data:
            value: "{{ states('sensor.battery_target_charge_level') | float(80) }}"

        - action: input_number.set_value
          target:
            entity_id: input_number.ev_session_battery_kwh
          data:
            value: 77

    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_session_active

    - action: logbook.log
      data:
        name: EV
        message: >
          Session startet
          (mode={{ states('input_select.ev_charge_mode') }},
          start_soc={{ states('input_number.ev_session_start_soc') }},
          target_soc={{ states('input_number.ev_session_target_soc') }},
          ready_by={{ states('input_datetime.ev_session_ready_by') }})
  mode: single

- id: 'ev_start_charging_stable'
  alias: EV - Start charging stable
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'LAD'
      for:
        minutes: 2
    - trigger: state
      entity_id:
        - input_boolean.ev_session_active
      to: 'on'
    - trigger: state
      entity_id:
        - binary_sensor.ev_cable_connected_effective
      to: 'on'
    - trigger: state
      entity_id:
        - input_boolean.ev_ha_control_enabled
      to: 'on'
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Auto'
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Charge Now'
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Monta Guest'
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Sun Optimized'
    - trigger: homeassistant
      event: start
  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'
    - condition: state
      entity_id: binary_sensor.ev_cable_connected_effective
      state: 'on'
    - condition: state
      entity_id: sensor.ev_charge_decision
      state: 'LAD'
    - condition: template
      value_template: "{{ states('sensor.ev_target_ampere_effective') | int(0) >= states('input_number.ev_min_charge_ampere') | int(7) }}"
    - condition: template
      value_template: "{{ states('sensor.eh45khwp_power') | float(0) < 0.5 }}"
    - condition: state
      entity_id: switch.eh45khwp_charger_enabled
      state: 'off'
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_start_delay_active

    - delay: "00:02:00"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.ev_ha_control_enabled
              state: 'on'
            - condition: state
              entity_id: input_boolean.ev_session_active
              state: 'on'
            - condition: state
              entity_id: binary_sensor.ev_cable_connected_effective
              state: 'on'
            - condition: state
              entity_id: sensor.ev_charge_decision
              state: 'LAD'
            - condition: template
              value_template: "{{ states('sensor.ev_target_ampere_effective') | int(0) >= states('input_number.ev_min_charge_ampere') | int(7) }}"
            - condition: template
              value_template: "{{ states('sensor.eh45khwp_power') | float(0) < 0.5 }}"
            - condition: state
              entity_id: switch.eh45khwp_charger_enabled
              state: 'off'
          sequence:
            - action: script.ev_charge_start
              data: {}
            - action: logbook.log
              data:
                name: EV
                message: >
                  Startet (mode={{ states('input_select.ev_charge_mode') }},
                  decision={{ states('sensor.ev_charge_decision') }},
                  amp={{ states('sensor.ev_target_ampere_effective') }})

      default:
        - action: logbook.log
          data:
            name: EV
            message: >
              Start annulleret efter delay
              (mode={{ states('input_select.ev_charge_mode') }},
              decision={{ states('sensor.ev_charge_decision') }},
              amp={{ states('sensor.ev_target_ampere_effective') }},
              cable={{ states('binary_sensor.ev_cable_connected_effective') }},
              session={{ states('input_boolean.ev_session_active') }})

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_start_delay_active

  mode: single

- id: ev_start_delay_off_when_not_lad
  alias: EV - Start delay off when not LAD
  triggers:
    - trigger: state
      entity_id: sensor.ev_charge_decision

  conditions:
    - condition: template
      value_template: "{{ states('sensor.ev_charge_decision') != 'LAD' }}"

  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_start_delay_active

  mode: restart  

  
- id: 'ev_stop_charging_stable'
  alias: EV - Stop charging stable
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'VENT'
      for:
        hours: 0
        minutes: 15
        seconds: 0
  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: state
      entity_id: input_select.ev_charge_mode
      state: 'Auto'

    - condition: state
      entity_id: binary_sensor.charging_cable_connected
      state: 'on'

  actions:
    - action: script.ev_charge_stop
      metadata: {}
      data: {}
    - action: logbook.log
      data:
        name: EV
        message: >
         Stoppet (decision={{ states('sensor.ev_charge_decision') }})  
  mode: single
  
- id: 'ev_control_reduced_ac_charging'
  alias: EV - Control reduced AC charging
