- id: 'ev_sync_mode_and_ha_control'
  alias: EV - Sync mode and HA control
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Stop'
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Auto'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Charge Now'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Monta Guest'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled

        - conditions:
            - condition: state
              entity_id: input_select.ev_charge_mode
              state: 'Sun Optimized'
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.ev_ha_control_enabled
  mode: single
  
- id: 'ev_stop_charging_immediate'
  alias: EV - Stop charging immediate
  description: Stopper straks når ladning ikke længere er tilladt
  triggers:
    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Stop'
    - trigger: state
      entity_id:
        - input_boolean.ev_ha_control_enabled
      to: 'off'
    - trigger: state
      entity_id:
        - input_boolean.ev_session_active
      to: 'off'
    - trigger: state
      entity_id:
        - binary_sensor.charging_cable_connected
      to: 'off'
  conditions:
    - condition: state
      entity_id: switch.eh45khwp_charger_enabled
      state: 'on'
  actions:
    - service: script.ev_charge_stop
    - service: logbook.log
      data:
        name: EV
        message: >
          Stoppet straks
          (mode={{ states('input_select.ev_charge_mode') }},
          ha_control={{ states('input_boolean.ev_ha_control_enabled') }},
          session={{ states('input_boolean.ev_session_active') }},
          cable={{ states('binary_sensor.charging_cable_connected') }})
  mode: single

- id: 'ev_sync_planned_to_session_when_idle'
  alias: EV - Sync planned ready time to session when idle
  description: ''
  triggers:
    - trigger: state
      entity_id:
        - input_datetime.ev_planned_ready_by
  conditions:
    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'off'
  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_session_ready_by
      data:
        datetime: "{{ states('input_datetime.ev_planned_ready_by') }}"
  mode: single

- id: 'ev_apply_target_ampere'
  alias: EV - Apply target ampere
  description: >
    MODEL B - Vedligeholder Easee ampere under aktiv/relevant opladning.
    Starter ikke ladning i sig selv, men sikrer at mode-skift til Auto,
    Monta Guest, Sun Optimized og Charge Now sender korrekt ampere til Easee.
  triggers:
    - trigger: state
      entity_id:
        - sensor.ev_target_ampere_effective
      for:
        seconds: 20

    - trigger: state
      entity_id:
        - switch.eh45khwp_charger_enabled
      to: 'on'
      for:
        seconds: 10

    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to:
        - 'Auto'
        - 'Monta Guest'
        - 'Sun Optimized'
        - 'Charge Now'
      for:
        seconds: 10

    - trigger: state
      entity_id:
        - sensor.ev_charge_decision
      to: 'LAD'
      for:
        seconds: 10

    - trigger: state
      entity_id:
        - binary_sensor.ev_ready_to_charge
      to: 'on'
      for:
        seconds: 10

  conditions:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: 'on'

    - condition: state
      entity_id: input_boolean.ev_session_active
      state: 'on'

    - condition: template
      value_template: >
        {% set cable_state = states('binary_sensor.ev_cable_connected_effective') %}
        {{ cable_state in ['on', 'unknown', 'unavailable'] }}

    - condition: template
      value_template: >
        {{ states('sensor.ev_target_ampere_effective') | int(0)
           >= states('input_number.ev_min_charge_ampere') | int(7) }}

    - condition: template
      value_template: >
        {{
          is_state('switch.eh45khwp_charger_enabled', 'on')
          or is_state('input_select.ev_charge_mode', 'Charge Now')
          or is_state('sensor.ev_charge_decision', 'LAD')
        }}

  actions:
    - action: script.ev_set_target_ampere
      data:
        ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"

  mode: restart

- id: 'intellicharge_acquire_ev_override'
  alias: IntelliCharge - Acquire EV Override
  description: EV overtager IntelliCharge når EV-logikken kræver Allow Always
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ev_should_force_intellicharge_allow
      to: 'on'
      for:
        seconds: 30

  conditions:
    - condition: state
      entity_id: input_boolean.intellicharge_overridden_by_ev
      state: 'off'

  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.intellicharge_pre_ev_mode
      data:
        option: >
          {% set s = states('sensor.ev_intellicharge_smart_status_2') %}
          {% if s in ['Smart', 'Allow Always'] %}
            {{ s }}
          {% else %}
            Smart
          {% endif %}

    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.intellicharge_overridden_by_ev

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.intellicharge_override_started_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: script.intellicharge_apply_allow

    - action: logbook.log
      data:
        name: IntelliCharge
        message: >
          EV override aktiveret.
          Pre-mode={{ states('input_select.intellicharge_pre_ev_mode') }},
          status={{ states('sensor.ev_intellicharge_smart_status_2') }},
          force={{ states('binary_sensor.ev_should_force_intellicharge_allow') }}

  mode: single

- id: 'intellicharge_release_ev_override'
  alias: IntelliCharge - Release EV Override
  description: Gendan kun IntelliCharge hvis EV tidligere har overtaget den
  triggers:
    - trigger: state
      entity_id:
        - binary_sensor.ev_should_force_intellicharge_allow
      to: 'off'
      for:
        minutes: 2

    - trigger: state
      entity_id:
        - input_select.ev_charge_mode
      to: 'Stop'

  conditions:
    - condition: state
      entity_id: input_boolean.intellicharge_overridden_by_ev
      state: 'on'

  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.intellicharge_pre_ev_mode
              state: 'Smart'
          sequence:
            - action: script.intellicharge_apply_smart

        - conditions:
            - condition: state
              entity_id: input_select.intellicharge_pre_ev_mode
              state: 'Allow Always'
          sequence:
            - action: script.intellicharge_apply_allow

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.intellicharge_overridden_by_ev

  mode: single

- id: 'intellicharge_recover_after_restart'
  alias: IntelliCharge - Recover after restart
  description: Genskab eller frigiv EV override efter restart
  triggers:
    - trigger: homeassistant
      event: start

  conditions: []

  actions:
    - delay: "00:00:30"

    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.intellicharge_overridden_by_ev
              state: 'on'
            - condition: state
              entity_id: binary_sensor.ev_should_force_intellicharge_allow
              state: 'on'
          sequence:
            - if:
                - condition: not
                  conditions:
                    - condition: state
                      entity_id: sensor.ev_intellicharge_smart_status_2
                      state: 'Allow Always'
              then:
                - action: script.intellicharge_apply_allow

                - action: logbook.log
                  data:
                    name: IntelliCharge
                    message: >
                      Recovery: beholdt/reetablerede Allow Always efter restart

        - conditions:
            - condition: state
              entity_id: input_boolean.intellicharge_overridden_by_ev
              state: 'on'
            - condition: state
              entity_id: binary_sensor.ev_should_force_intellicharge_allow
              state: 'off'
          sequence:
            - choose:
                - conditions:
                    - condition: state
                      entity_id: input_select.intellicharge_pre_ev_mode
                      state: 'Smart'
                  sequence:
                    - action: script.intellicharge_apply_smart

                    - action: logbook.log
                      data:
                        name: IntelliCharge
                        message: >
                          Recovery: gendannede Smart efter restart

                - conditions:
                    - condition: state
                      entity_id: input_select.intellicharge_pre_ev_mode
                      state: 'Allow Always'
                  sequence:
                    - action: script.intellicharge_apply_allow

                    - action: logbook.log
                      data:
                        name: IntelliCharge
                        message: >
                          Recovery: gendannede Allow Always efter restart

            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.intellicharge_overridden_by_ev

  mode: single

- id: ev_intellicharge_acquire
  alias: EV - IntelliCharge Acquire
  initial_state: false
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.ev_intellicharge_override_needed
      to: "on"
      for: "00:01:00"

  condition:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: "on"

    - condition: template
      value_template: >
        {{ not is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}

  action:
    - service: script.intellicharge_apply_allow

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_intellicharge_settling

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_intellicharge_last_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"  

- id: ev_intellicharge_release
  alias: EV - IntelliCharge Release
  initial_state: false
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.ev_intellicharge_override_needed
      to: "off"
      for: "00:03:00"

  condition:
    - condition: state
      entity_id: input_boolean.ev_ha_control_enabled
      state: "on"

    - condition: template
      value_template: >
        {{ is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}

  action:
    - service: script.intellicharge_apply_smart

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_intellicharge_settling

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_intellicharge_last_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

- id: ev_intellicharge_settling_clear
  alias: EV - IntelliCharge Settling Clear
  initial_state: false
  mode: restart

  trigger:
    - platform: state
      entity_id: input_boolean.ev_intellicharge_settling
      to: "on"

  action:
    - delay: "00:03:00"

    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_intellicharge_settling

- id: ev_ha_control_disabled_failsafe
  alias: EV - HA Control Disabled Failsafe
  mode: single

  trigger:
    - platform: state
      entity_id: input_boolean.ev_ha_control_enabled
      to: "off"

  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_intellicharge_settling

    - if:
        - condition: template
          value_template: >
            {{ is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}
      then:
        - service: script.intellicharge_apply_smart

- id: 'ev_sun_optimized_to_auto_at_sunset'
  alias: EV - Sun Optimized to Auto at sunset
  description: Skifter fra Sun Optimized til Auto ved solnedgang
  triggers:
    - trigger: state
      entity_id:
        - sun.sun
      to: 'below_horizon'
  conditions:
    - condition: state
      entity_id: input_select.ev_charge_mode
      state: 'Sun Optimized'
  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.ev_charge_mode
      data:
        option: 'Auto'
    - action: logbook.log
      data:
        name: EV
        message: 'Sun Optimized afsluttet ved solnedgang – skifter til Auto'
  mode: single

