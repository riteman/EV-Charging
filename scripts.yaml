ev_charge_start:
  alias: EV Charge Start
  mode: restart
  sequence:
    - variables:
        target_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        min_amp: "{{ states('input_number.ev_min_charge_ampere') | int(7) }}"

    - condition: template
      value_template: >
        {{ target_ampere >= min_amp and target_ampere <= 16 }}

    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_charger_transition_active

    # 1. Sæt ampere før start
    - action: script.ev_set_target_ampere
      data:
        ampere: "{{ target_ampere }}"

    - delay: "00:00:05"

    # 2. Ryd gammel handshake/lade-state
    - action: switch.turn_off
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - delay: "00:00:10"

    # 3. Sæt ampere igen efter stop
    - action: script.ev_set_target_ampere
      data:
        ampere: "{{ target_ampere }}"

    - delay: "00:00:05"

    # 4. Aktiver lader
    - action: switch.turn_on
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - delay: "00:00:05"

    # 5. Send egentlig Easee start_charging
    - action: rest_command.easee_start_charging

    - delay: "00:00:30"

    # 6. Retry hvis Easee hænger i "Venter på godkendelse"
    - repeat:
        count: 3
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{
                    states('sensor.eh45khwp_power') | float(0) < 0.5
                    and states('sensor.eh45khwp_status') in
                    ['Venter på godkendelse', 'Waiting for authorization']
                  }}
            then:
              - action: logbook.log
                data:
                  name: EV
                  message: >
                    Start retry {{ repeat.index }}
                    (status={{ states('sensor.eh45khwp_status') }},
                    power={{ states('sensor.eh45khwp_power') }},
                    amp={{ target_ampere }})

              - action: switch.turn_off
                target:
                  entity_id: switch.eh45khwp_charger_enabled

              - delay: "00:00:12"

              - action: script.ev_set_target_ampere
                data:
                  ampere: "{{ target_ampere }}"

              - delay: "00:00:05"

              - action: switch.turn_on
                target:
                  entity_id: switch.eh45khwp_charger_enabled

              - delay: "00:00:05"

              - action: rest_command.easee_start_charging

              - delay: "00:00:30"

    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_charger_transition_active

    - action: logbook.log
      data:
        name: EV
        entity_id: switch.eh45khwp_charger_enabled
        message: >
          Easee startsekvens afsluttet
          (status={{ states('sensor.eh45khwp_status') }},
          power={{ states('sensor.eh45khwp_power') }},
          amp={{ target_ampere }})

ev_charge_stop:
  alias: EV Charge Stop
  mode: single
  sequence:
    - service: rest_command.easee_stop_charging

    - delay: "00:00:02"

    - service: switch.turn_off
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - action: logbook.log
      data:
        name: EV
        message: "Easee stop_charging sendt og lader stoppet"           
        
ev_set_manual_ampere:
  alias: EV - Set manual ampere
  sequence:
    - action: rest_command.set_ioniq_ampere
      data:
        ampere: "{{ states('input_number.ev_manual_ampere') | int(10) }}"
  mode: single

ev_set_target_ampere:
  alias: EV - Set target ampere
  mode: single
  fields:
    ampere:
      description: "Ampere to apply to Easee charger"
      example: 10
  sequence:
    - variables:
        requested_ampere: >
          {% set passed = ampere | default(none) %}
          {% if passed is not none and passed not in ['', 'unknown', 'unavailable', 'none'] %}
            {{ passed | int(0) }}
          {% else %}
            {{ states('sensor.ev_target_ampere_effective') | int(0) }}
          {% endif %}
    - condition: template
      value_template: >
        {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
        {{ requested_ampere >= min_amp and requested_ampere <= 16 }}
    - if:
        - condition: template
          value_template: >
            {{
              state_attr('sensor.easee_api_access_token_final_2', 'accessToken') in [none, '']
              or (
                states('sensor.easee_token_age_hours') not in ['unknown', 'unavailable', '', 'none']
                and states('sensor.easee_token_age_hours') | float(999) > 1.5
              )
            }}
      then:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.easee_api_access_token_final_2
        - delay: "00:00:03"
    - action: rest_command.set_ioniq_ampere
      data:
        ampere: "{{ requested_ampere }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.ev_last_sent_ampere
      data:
        value: "{{ requested_ampere }}"
    - action: logbook.log
      data:
        name: EV
        entity_id: switch.eh45khwp_charger_enabled
        message: "Ampere sat til {{ requested_ampere }} A"

intellicharge_export_allow_always:
  alias: IntelliCharge Export Allow Always
  mode: single
  sequence:
    - if:
        - condition: template
          value_template: >
            {{ is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}
      then:
        - stop: "IntelliCharge er allerede Allow Always"

    - service: rest_command.intellicharge_export_allow_always

    - delay: "00:00:08"

    - service: homeassistant.update_entity
      target:
        entity_id: sensor.ev_intellicharge_smart_status_2

    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.intellicharge_smart_enabled

    - service: input_select.select_option
      target:
        entity_id: input_select.intellicharge_desired_mode
      data:
        option: "Allow Always"

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_intellicharge_last_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

