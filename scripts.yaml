ev_charge_start_old:
  alias: EV Charge Start Old
  mode: restart
  sequence:
    - variables:
        target_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        min_amp: "{{ states('input_number.ev_min_charge_ampere') | int(7) }}"

    - condition: template
      value_template: >
        {{ target_ampere >= min_amp and target_ampere <= 16 }}

    # 1. Sæt ampere først, så Easee ikke forsøger start med 0A/gammel strømgrænse
    - action: script.ev_set_target_ampere
      data:
        ampere: "{{ target_ampere }}"

    - delay: "00:00:05"

    # 2. Enable ladeboksen
    - action: switch.turn_on
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - delay: "00:00:05"

    # 3. Send Easee start_charging
    - action: rest_command.easee_start_charging

    - delay: "00:00:30"

    # 4. Retry hvis Easee stadig ikke leverer effekt
    - repeat:
        count: 3
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{
                    states('sensor.eh45khwp_power') | float(0) < 0.5
                    and states('sensor.eh45khwp_reason_for_no_current') in
                    ['pending_authorization', 'Pending authorisation',
                     'Venter på godkendelse', 'Waiting for authorization', 'Afventer bil']
                  }}
            then:
              - action: logbook.log
                data:
                  name: EV
                  message: >
                    Easee start retry {{ repeat.index }}
                    (reason={{ states('sensor.eh45khwp_reason_for_no_current') }},
                    status={{ states('sensor.eh45khwp_status') }},
                    power={{ states('sensor.eh45khwp_power') }},
                    amp={{ target_ampere }})

              - action: script.ev_set_target_ampere
                data:
                  ampere: "{{ target_ampere }}"

              - delay: "00:00:05"

              - action: switch.turn_on
                target:
                  entity_id: switch.eh45khwp_charger_enabled

              - delay: "00:00:05"

              - action: rest_command.easee_start_charging

              - delay: "00:00:30"

    # 5. Efterlad altid Easee enabled
    - action: switch.turn_on
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - action: logbook.log
      data:
        name: EV
        entity_id: switch.eh45khwp_charger_enabled
        message: >
          Easee startsekvens afsluttet
          (reason={{ states('sensor.eh45khwp_reason_for_no_current') }},
          status={{ states('sensor.eh45khwp_status') }},
          power={{ states('sensor.eh45khwp_power') }},
          amp={{ target_ampere }},
          enabled={{ states('switch.eh45khwp_charger_enabled') }})

ev_charge_start:
  alias: EV Charge Start
  mode: single
  sequence:
    - variables:
        target_ampere: "{{ states('sensor.ev_target_ampere_effective') | int(0) }}"
        min_amp: "{{ states('input_number.ev_min_charge_ampere') | int(7) }}"

    - condition: template
      value_template: >
        {{ target_ampere >= min_amp and target_ampere <= 16 }}

    - action: switch.turn_on
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - delay: "00:00:05"

    - action: script.ev_set_target_ampere
      data:
        ampere: "{{ target_ampere }}"

    - delay: "00:00:20"

    - action: rest_command.easee_start_charging

    - delay: "00:00:15"

    - if:
        - condition: template
          value_template: >
            {{
              states('sensor.eh45khwp_power') | float(0) < 0.5
              and states('sensor.eh45khwp_reason_for_no_current') in [
                'pending_authorization',
                'Pending authorisation',
                'Venter på godkendelse',
                'Afventer godkendelse'
              ]
            }}
      then:
        - action: rest_command.easee_start_charging
        - delay: "00:00:15"

    - action: logbook.log
      data:
        name: EV
        entity_id: switch.eh45khwp_charger_enabled
        message: >
          Easee startsekvens afsluttet
          (amp={{ target_ampere }},
          enabled={{ states('switch.eh45khwp_charger_enabled') }},
          reason={{ states('sensor.eh45khwp_reason_for_no_current') }},
          power={{ states('sensor.eh45khwp_power') }})

ev_charge_stop:
  alias: EV Charge Stop
  mode: single
  sequence:
    - action: rest_command.easee_stop_charging

    - delay: "00:00:02"

    - action: script.ev_set_target_ampere
      data:
        ampere: 0

    - delay: "00:00:02"

    - action: switch.turn_on
      target:
        entity_id: switch.eh45khwp_charger_enabled

    - action: logbook.log
      data:
        name: EV
        message: >
          Easee stop_charging sendt og ampere sat til 0
          (charger enabled={{ states('switch.eh45khwp_charger_enabled') }},
          status={{ states('sensor.eh45khwp_status') }},
          reason={{ states('sensor.eh45khwp_reason_for_no_current') }},
          power={{ states('sensor.eh45khwp_power') }},
          last_amp={{ states('input_number.ev_last_sent_ampere') }})
        
ev_set_manual_ampere:
  alias: EV - Set manual ampere
  sequence:
    - action: rest_command.set_ioniq_ampere
      data:
        ampere: "{{ states('input_number.ev_manual_ampere') | int(10) }}"
  mode: single

ev_set_target_ampere:
  alias: EV - Set target ampere
  mode: single
  fields:
    ampere:
      description: "Ampere to apply to Easee charger"
      example: 10

  sequence:
    - variables:
        requested_ampere: >
          {% set passed = ampere | default(none) %}
          {% if passed is not none and passed not in ['', 'unknown', 'unavailable', 'none'] %}
            {{ passed | int(0) }}
          {% else %}
            {{ states('sensor.ev_target_ampere_effective') | int(0) }}
          {% endif %}
        min_amp: "{{ states('input_number.ev_min_charge_ampere') | int(7) }}"

    - condition: template
      value_template: >
        {{ requested_ampere == 0 or (requested_ampere >= min_amp and requested_ampere <= 16) }}

    - if:
        - condition: template
          value_template: >
            {{
              state_attr('sensor.easee_api_access_token_final_2', 'accessToken') in [none, '']
              or (
                states('sensor.easee_token_age_hours') not in ['unknown', 'unavailable', '', 'none']
                and states('sensor.easee_token_age_hours') | float(999) > 1.5
              )
            }}
      then:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.easee_api_access_token_final_2
        - delay: "00:00:03"

    - action: rest_command.set_ioniq_ampere
      data:
        ampere: "{{ requested_ampere }}"

    - delay: "00:00:08"

    - action: homeassistant.update_entity
      target:
        entity_id: sensor.eh45khwp_dynamic_charger_limit

    - delay: "00:00:03"

    - variables:
        easee_actual_ampere: "{{ states('sensor.eh45khwp_dynamic_charger_limit') | int(-1) }}"
        easee_confirmed: >
          {{
            states('sensor.eh45khwp_dynamic_charger_limit') | int(-1)
            ==
            requested_ampere | int(0)
          }}

    - if:
        - condition: template
          value_template: "{{ easee_confirmed }}"
      then:
        - action: input_number.set_value
          target:
            entity_id: input_number.ev_last_sent_ampere
          data:
            value: "{{ requested_ampere }}"

        - action: logbook.log
          data:
            name: EV
            entity_id: switch.eh45khwp_charger_enabled
            message: >
              Ampere bekræftet af Easee:
              requested={{ requested_ampere }} A,
              actual={{ easee_actual_ampere }} A
      else:
        - action: logbook.log
          data:
            name: EV WARNING
            entity_id: switch.eh45khwp_charger_enabled
            message: >
              Ampere IKKE bekræftet af Easee:
              requested={{ requested_ampere }} A,
              actual={{ easee_actual_ampere }} A,
              target={{ states('sensor.ev_target_ampere_effective') }} A,
              mode={{ states('input_select.ev_charge_mode') }},
              status={{ states('sensor.eh45khwp_status') }},
              reason={{ states('sensor.eh45khwp_reason_for_no_current') }}

intellicharge_export_allow_always:
  alias: IntelliCharge Export Allow Always
  mode: single
  sequence:
    - if:
        - condition: template
          value_template: >
            {{ is_state('sensor.ev_intellicharge_smart_status_2', 'Allow Always') }}
      then:
        - stop: "IntelliCharge er allerede Allow Always"

    - service: rest_command.intellicharge_export_allow_always

    - delay: "00:00:08"

    - service: homeassistant.update_entity
      target:
        entity_id: sensor.ev_intellicharge_smart_status_2

    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.intellicharge_smart_enabled

    - service: input_select.select_option
      target:
        entity_id: input_select.intellicharge_desired_mode
      data:
        option: "Allow Always"

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ev_intellicharge_last_change
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

