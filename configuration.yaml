            {% elif decision == 'LAD' and raw >= 6 and stable >= 6 and effective >= 6 %}
              Systemet vil gerne lade og har gyldig ampere, men afventer at startflowet materialiserer sig.
            {% elif mode == 'Sun Optimized' and decision == 'VENT' %}
