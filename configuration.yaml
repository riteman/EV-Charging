          {% set target_reached = target > 0 and soc >= (target - 0.5) %}
          {% set session_complete = is_state('binary_sensor.ev_session_complete', 'on') %}
          {% set ns = namespace(slot_start_ts=none, slot_end_ts=none, slot_active=false, slot_future=false) %}

          {% if next_slot not in ['unknown', 'unavailable', '', '-', 'none'] and '-' in next_slot %}
            {% set start_txt = next_slot.split('-')[0].strip() %}
            {% set end_txt = next_slot.split('-')[1].strip() %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set start_ts = as_timestamp(today ~ ' ' ~ start_txt ~ ':00') %}
            {% set end_ts = as_timestamp(today ~ ' ' ~ end_txt ~ ':00') %}
            {% if start_ts is not none and end_ts is not none %}
              {% set ns.slot_start_ts = start_ts %}
              {% set ns.slot_end_ts = end_ts %}
              {% set ns.slot_active = now().timestamp() >= start_ts and now().timestamp() < end_ts %}
              {% set ns.slot_future = now().timestamp() < start_ts %}
            {% endif %}
          {% endif %}

          {% if mode == 'Stop' %}
            Stop valgt
          {% elif mode in ['Auto', 'Charge Now', 'Sun Optimized'] and target_reached %}
            Færdig
          {% elif mode == 'Monta Guest' and session_complete %}
            Færdig
          {% elif not ready %}
            Mangler – tryk for detaljer
          {% elif charging %}
            Lader nu
          {% elif start_delay %}
            Starter snart
          {% elif decision == 'LAD' and effective < min_amp %}
            Blokeret – Amp for lav
          {% elif decision == 'LAD' and charger_on and no_current_reason == 'pending_authorization' %}
            Blokeret – afventer bil
          {% elif decision == 'LAD' and charger_on and not charging %}
            Blokeret – ingen ladeeffekt
          {% elif decision == 'LAD' and missing != 'OK' %}
            Blokeret – krav ikke opfyldt
          {% elif decision == 'LAD' and raw >= min_amp and stable >= min_amp and effective >= min_amp %}
            Klar til opladning
          {% elif mode == 'Sun Optimized' and decision == 'VENT' %}
            Klar - venter på sol
          {% elif mode == 'Auto' and ns.slot_future %}
            Klar - venter på slot {{ next_slot }}
          {% elif mode == 'Auto' and decision == 'VENT' %}
            Klar - venter på billigere slot
          {% elif ns.slot_future %}
            Klar - venter på slot {{ next_slot }}
          {% elif ns.slot_active %}
            Klar
          {% else %}
            Klar
          {% endif %}

        attributes:
