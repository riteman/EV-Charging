      - name: "EV ETA If Solar Continues Until Sunset"
        unique_id: ev_eta_if_solar_continues_until_sunset
        device_class: timestamp
        state: >
          {% set remaining = states('sensor.ev_remaining_energy_live_kwh') | float(0) %}
          {% set amp = states('sensor.ev_target_ampere_stable') | float(0) %}
          {% set ready_ts = state_attr('input_datetime.ev_session_ready_by', 'timestamp') | float(0) %}
          {% set efficiency = 0.92 %}
          {% set full_power_kw = 11 %}
          {% set now_ts = as_timestamp(now()) | float(0) %}
          {% set sunset_ts = as_timestamp(state_attr('sun.sun', 'next_setting')) | float(0) %}
          {% set sun_up = is_state('sun.sun', 'above_horizon') %}

          {% if ready_ts <= 0 %}
            {{ now().isoformat() }}
          {% elif remaining <= 0 %}
            {{ now().isoformat() }}
          {% else %}
            {% set has_day_phase = amp >= 6 and sun_up and sunset_ts > now_ts %}

            {% if has_day_phase %}
              {% set day_end_ts = [sunset_ts, ready_ts] | min %}
              {% set day_hours = [(day_end_ts - now_ts) / 3600, 0] | max %}
              {% set day_power_kw = full_power_kw * (amp / 16) %}
              {% set day_energy_possible = day_hours * day_power_kw * efficiency %}
              {% set day_energy_used = [remaining, day_energy_possible] | min %}
              {% set remaining_after_day = [remaining - day_energy_used, 0] | max %}
            {% else %}
              {% set day_end_ts = now_ts %}
              {% set day_power_kw = 0 %}
              {% set day_energy_used = 0 %}
              {% set remaining_after_day = remaining %}
            {% endif %}

            {% if remaining_after_day <= 0 and day_power_kw > 0 %}
              {% set hours_needed = remaining / (day_power_kw * efficiency) %}
              {{ ((now_ts + (hours_needed * 3600)) | timestamp_local) | replace(' ', 'T') }}
            {% else %}
              {% set need_hours = remaining_after_day / (full_power_kw * efficiency) %}
              {% set prices =
                (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
                + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [])
