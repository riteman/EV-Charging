          {% if ts in ['unknown', 'unavailable', '', 'none'] %}
            unknown
          {% else %}
            {{ as_timestamp(ts) | timestamp_custom('%H:%M', true) }}
          {% endif %}      

      - name: "EV ETA Window"
        unique_id: ev_eta_window
        state: >
          {% set a = states('sensor.ev_eta_if_solar_continues_until_sunset') %}
          {% set b = states('sensor.ev_eta_if_solar_stops_now') %}
          {% if a in ['unknown','unavailable',''] or b in ['unknown','unavailable',''] %}
            unknown
          {% else %}
            {{ as_datetime(a).strftime('%H:%M') }} → {{ as_datetime(b).strftime('%H:%M') }}
          {% endif %}

        attributes:
          eta_best_case: >
            {{ states('sensor.ev_eta_if_solar_continues_until_sunset') }}

          eta_worst_case: >
            {{ states('sensor.ev_eta_if_solar_stops_now') }}
          
    - !include templates/ev_debug.yaml   
          
    - trigger:
      - platform: state
        entity_id: sensor.ev_target_ampere_raw
        for: "00:05:00"
      sensor:
      - name: "EV Target Ampere Stable"
        unique_id: ev_target_ampere_stable
        unit_of_measurement: "A"
        state: >
          {{ states('sensor.ev_target_ampere_raw') | int(16) }}

    - sensor:
      - name: "EV Target Ampere Effective"
        unique_id: ev_target_ampere_effective
        unit_of_measurement: "A"
        state: >
          {% set new = states('sensor.ev_target_ampere_stable') | int(16) %}
          {% set old = states('input_number.ev_last_sent_ampere') | int(16) %}
          {% set last = states.input_number.ev_last_sent_ampere.last_changed %}
          {% set age_ok = (as_timestamp(now()) - as_timestamp(last)) > 900 %}
          {% set delta_ok = (new - old) | abs >= 2 %}

          {% if age_ok and delta_ok %}
            {{ new }}
          {% else %}
            {{ old }}
          {% endif %}
          
    - sensor:
      - name: "EV Night Reference Selected"
        unique_id: ev_night_reference_selected
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}
          {% set now_ts = as_timestamp(now()) %}
          {% set ready_ts = as_timestamp(ready) if ready not in ['unknown','unavailable',''] else now_ts %}
          {% set ns = namespace(candidates=[], remaining=need, selected=[]) %}

          {# Find kandidater #}
          {% for item in prices %}
            {% set start_ts = as_timestamp(item.start) %}
            {% set end_ts = start_ts + 3600 %}
            {% set overlap_start = [start_ts, now_ts] | max %}
            {% set overlap_end = [end_ts, ready_ts] | min %}
            {% set overlap = (overlap_end - overlap_start) / 3600 %}

            {% if overlap > 0 %}
              {% set ns.candidates = ns.candidates + [(start_ts, item.price | float(999), overlap)] %}
            {% endif %}
          {% endfor %}

          {% set sorted = ns.candidates | sort(attribute=1) %}

          {# Vælg billigste indtil behov dækket #}
          {% for start_ts, price, avail in sorted %}
            {% if ns.remaining > 0 %}
              {% set used = [avail, ns.remaining] | min %}
              {% set ns.remaining = ns.remaining - used %}
              {% set ns.selected = ns.selected + [(start_ts, used)] %}
            {% endif %}
          {% endfor %}

          {# Sortér kronologisk #}
          {% set slots = ns.selected | sort %}

          {# Lav pæn tekst #}
          {% set ns2 = namespace(out=[]) %}

          {% for start_ts, used in slots %}
            {% set end_ts = start_ts + (used * 3600) %}
            {% set ns2.out = ns2.out + [
              as_datetime(start_ts).strftime('%H:%M')
              ~ '-'
              ~ as_datetime(end_ts).strftime('%H:%M')
            ] %}
          {% endfor %}

          {{ ns2.out | join(', ') if ns2.out else 'Ingen' }}
          
      - name: "Easee Token Last Refresh"
        unique_id: easee_token_last_refresh
        device_class: timestamp
        state: >
          {% set raw = states('sensor.easee_api_access_token_final_2') %}
          {% if raw not in ['unknown','unavailable',''] %}
            {% set dt = strptime(raw, '%Y-%m-%d %H:%M:%S') %}
            {{ as_timestamp(dt) | timestamp_local }}
          {% else %}
            unknown
          {% endif %}
          
      - name: "Easee Token Age Hours"
        unique_id: easee_token_age_hours
        unit_of_measurement: "h"
        state: >
          {% set raw = states('sensor.easee_api_access_token_final_2') %}
          {% if raw not in ['unknown','unavailable',''] %}
            {% set dt = strptime(raw, '%Y-%m-%d %H:%M:%S') %}
            {{ ((as_timestamp(now()) - as_timestamp(dt)) / 3600) | round(1) }}
          {% else %}
            unknown
          {% endif %}  

      - name: "IntelliCharge Token Last Refresh"
        unique_id: intellicharge_token_last_refresh
        device_class: timestamp
        state: >
          {% set ts = states('sensor.intellicharge_api_auth') %}
          {% if ts not in ['unknown', 'unavailable', '', 'none'] %}
            {{ ts }}
          {% else %}
            {{ none }}
          {% endif %}

      - name: "IntelliCharge Token Age Hours"
        unique_id: intellicharge_token_age_hours
        unit_of_measurement: "h"
        state: >
          {% set ts = states('sensor.intellicharge_api_auth') %}
          {% if ts not in ['unknown', 'unavailable', '', 'none'] %}
            {{ ((as_timestamp(now()) - as_timestamp(ts)) / 3600) | round(2) }}
          {% else %}
            {{ none }}
          {% endif %}      

        
 # -----------------------------------------------------------------------------

    - binary_sensor:
      - name: "EV Deadline Risk"
        unique_id: ev_deadline_risk
        state: >
          {% set needed = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set available = states('sensor.ev_hours_until_ready') | float(0) %}
          {{ needed > available and needed > 0 }}

      - name: "EV Session Complete"
        unique_id: ev_session_complete
        state: >
          {{ states('sensor.ev_remaining_energy_kwh') | float(0) <= 0.5 }}
          
      - name: "EV Cable Connected Effective"
        unique_id: ev_cable_connected_effective
        state: >
          {{
            is_state('binary_sensor.charging_cable_connected', 'on')
            or is_state('input_boolean.ev_simulation_mode', 'on')
          }}
          
      - name: "EV Export Price Positive"
        unique_id: ev_export_price_positive
        state: >
          {{ states('sensor.nordpool_kwh_dk1_dkk_3_10_025') | float(0) >= 0 }}
          
      - name: "IntelliCharge Token Stale"
        unique_id: intellicharge_token_stale
        state: >
          {% set age = states('sensor.intellicharge_token_age_hours') | float(0) %}
          {{ age > 20 }} 

      
      - name: "IntelliCharge Smart Sync Error"
        unique_id: intellicharge_smart_sync_error
        state: >
          {% set actual = states('sensor.ev_intellicharge_smart_status_2') %}
          {% set desired = states('input_select.intellicharge_desired_mode') %}
          {% if actual in ['unknown', 'unavailable', '', 'none'] or desired in ['unknown', 'unavailable', '', 'none'] %}
            false
          {% else %}
            {{ actual != desired }}
          {% endif %} 


      - name: "EV Should Force IntelliCharge Allow"
        unique_id: ev_should_force_intellicharge_allow
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set decision = states('sensor.ev_charge_decision') %}
          {% set price = states('sensor.electricity_price_now_real') | float(999) %}
          {% set cable = is_state('binary_sensor.charging_cable_connected', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set ha = is_state('input_boolean.ev_ha_control_enabled', 'on') %}

          {{
            ha
            and session
            and cable
            and mode in ['Auto', 'Charge Now', 'Monta Guest']
            and decision == 'LAD'
            and price < 0
          }}    

      - name: "EV Ampere Update Allowed"
        unique_id: ev_ampere_update_allowed
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set cable = is_state('binary_sensor.charging_cable_connected', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set ha = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set target = states('sensor.ev_target_ampere_effective') | int(0) %}

          {{
            ha
            and session
            and cable
            and mode in ['Auto', 'Charge Now', 'Monta Guest']
            and target > 0
          }}  
    

# 2. Kommandoen der styrer ampere 
rest_command:
  set_ioniq_ampere:
    url: "https://api.easee.cloud/api/chargers/EH45KHWP/settings"
    method: post
    headers:
      authorization: "Bearer {{ state_attr('sensor.easee_api_access_token_final_2', 'accessToken') }}"
      content-type: "application/json"
    payload: '{"dynamicChargerCurrent": {{ ampere | int }}}'

  intellicharge_set_smart:
    url: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: PUT
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      content-type: "application/json"
    payload: >
      {"smart_0_export": 1, "allow_export_to_grid": false, "enable_buy_from_grid": true, "enable_sell_to_grid": true, "enable_idle": true, "enable_locked": true}


  intellicharge_set_allow_always:
    url: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: PUT
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      content-type: "application/json"
    payload: >
      {"smart_0_export": 0, "allow_export_to_grid": false, "enable_buy_from_grid": true, "enable_sell_to_grid": true, "enable_idle": true, "enable_locked": true}    


rest:
  - resource: "https://api.easee.cloud/api/accounts/login"
    method: POST
    # !secret skal stå helt alene uden anførselstegn omkring sig
    payload: !secret easee_payload
    headers:
      Content-Type: "application/json"
    scan_interval: 43200
    sensor:
      - name: "Easee API Access Token Final"
        unique_id: easee_api_token_manual_final
        value_template: >
          {% if value_json is defined and value_json.accessToken is defined %}
            {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
          {% else %}
            FEJL
          {% endif %}
        json_attributes:
          - accessToken

  # 🔐 IntelliCharge AUTH
  - resource: "https://api.intellicharge.ai/api/v1/login/access-token"
    method: POST
    payload: !secret intellicharge_login_payload
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json, text/plain, */*"
    scan_interval: 43200

    sensor:
      - name: "IntelliCharge API Auth"
        unique_id: intellicharge_api_auth
        value_template: >
          {% if value_json is defined and value_json.access_token is defined %}
            {{ now().isoformat() }}
          {% else %}
            {{ none }}
          {% endif %}
        json_attributes:
          - access_token
          - refresh_token
          - token_type


  # ⚡ IntelliCharge PLANT STATUS
  - resource_template: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: GET
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      Accept: "application/json"
    scan_interval: 300

    sensor:
      - name: "EV IntelliCharge Smart Status"
        unique_id: ev_intellicharge_smart_status

        value_template: >
          {% if value_json.smart_0_export == 1 %}
            Smart
          {% elif value_json.smart_0_export == 0 %}
            Allow Always
          {% else %}
            Ukendt
          {% endif %}

        icon: >
          {% if value_json.smart_0_export == 1 %}
            mdi:brain
          {% else %}
            mdi:flash
          {% endif %}

        json_attributes:
          - smart_0_export
          - allow_export_to_grid
          - enable_buy_from_grid
          - enable_sell_to_grid
          - enable_idle
          - enable_locked

  - resource_template: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: GET
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      Accept: "application/json"
    scan_interval: 300

    sensor:
      - name: "EV IntelliCharge Smart Status"
        unique_id: ev_intellicharge_smart_status

        value_template: >
          {% if value_json.smart_0_export == 1 %}
            Smart
          {% elif value_json.smart_0_export == 0 %}
            Allow Always
          {% else %}
            Ukendt
          {% endif %}

        icon: >
          {% if value_json.smart_0_export == 1 %}
            mdi:brain
          {% else %}
            mdi:flash
          {% endif %}

        json_attributes:
          - smart_0_export
          - allow_export_to_grid
          - enable_buy_from_grid
          - enable_sell_to_grid
          - enable_idle
          - enable_locked


          
