      - name: "EV Planned Finish Time"
        unique_id: ev_planned_finish_time
        state: >
          {% set slots = states('sensor.ev_charge_windows_real') %}
          
          {% if slots in ['unknown', 'unavailable', '', '-'] %}
            -
