      - name: "EV ETA If Solar Stops Now"
        unique_id: ev_eta_if_solar_stops_now
        device_class: timestamp
        state: >
          {% set remaining = states('sensor.ev_remaining_energy_live_kwh') | float(0) %}
          {% set ready_ts = state_attr('input_datetime.ev_session_ready_by', 'timestamp') | float(0) %}
          {% set power_kw = 11 %}
          {% set efficiency = 0.92 %}
          {% set now_ts = as_timestamp(now()) | float(0) %}

          {% if ready_ts <= 0 %}
            {{ now().isoformat() }}
          {% elif remaining <= 0 %}
            {{ now().isoformat() }}
          {% else %}
            {% set need_hours = remaining / (power_kw * efficiency) %}
            {% set prices =
              (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
              + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [])
            %}
            {% set ns = namespace(candidates=[], remaining=need_hours, finish_ts=0) %}

            {% for item in prices %}
