                    {% set ns.finish_ts = used_end_ts %}
                  {% endif %}
                {% endif %}
              {% endfor %}

              {% if ns.finish_ts > 0 %}
                {{ (ns.finish_ts | timestamp_local) | replace(' ', 'T') }}
              {% else %}
                {{ (ready_ts | timestamp_local) | replace(' ', 'T') }}
              {% endif %}
            {% endif %}
          {% endif %}

        attributes:
