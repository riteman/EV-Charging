          {% elif new > 0 and new < min_amp %}
            0
          {% elif old > 0 and old < min_amp %}
            {{ new if new >= min_amp else 0 }}
          {% elif age_ok and delta_ok %}
            {{ new }}
          {% else %}
            {{ old }}
          {% endif %}
          
