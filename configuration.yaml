      - name: "EV Cheapest Hour Price Real"
        unique_id: ev_cheapest_hour_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if ready in ['unknown', 'unavailable', ''] %}
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set ns = namespace(vals=[]) %}

            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% set end_ts = start_ts + 3600 %}
              {% set overlap_start = [start_ts, now_ts] | max %}
              {% set overlap_end = [end_ts, ready_ts] | min %}
              {% set overlap = (overlap_end - overlap_start) / 3600 %}

              {% if overlap > 0 %}
                {% set ns.vals = ns.vals + [item.price | float(999)] %}
              {% endif %}
            {% endfor %}

            {% if ns.vals | count > 0 %}
              {{ (ns.vals | min) | round(3) }}
            {% else %}
              {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
            {% endif %}
          {% endif %}
          
      - name: "EV Charge Windows Real"
        unique_id: ev_charge_windows_real
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if need <= 0 or ready in ['unknown', 'unavailable', '', 'none'] %}
            -
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set ns = namespace(candidates=[], remaining=need, selected=[], out=[], cur_start=none, cur_end=none) %}

            {% for item in prices %}
              {% set slot_start = as_timestamp(item.start) %}
              {% set slot_end = slot_start + 3600 %}
              {% set usable_start = [slot_start, now_ts] | max %}
              {% set usable_end = [slot_end, ready_ts] | min %}
              {% set usable_hours = (usable_end - usable_start) / 3600 %}

              {% if usable_hours > 0 %}
                {% set ns.candidates = ns.candidates + [[item.price | float(999), slot_start, slot_end, usable_hours]] %}
              {% endif %}
            {% endfor %}

            {% for item in ns.candidates | sort %}
              {% if ns.remaining > 0 %}
                {% set used = [item[3], ns.remaining] | min %}
                {% set ns.remaining = ns.remaining - used %}
                {% set ns.selected = ns.selected + [[item[1], item[2]]] %}
              {% endif %}
            {% endfor %}

            {% for item in ns.selected | sort %}
              {% set start_ts = item[0] %}
              {% set end_ts = item[1] %}

              {% if ns.cur_start is none %}
                {% set ns.cur_start = start_ts %}
                {% set ns.cur_end = end_ts %}
              {% elif start_ts <= (ns.cur_end + 60) %}
                {% set ns.cur_end = [ns.cur_end, end_ts] | max %}
              {% else %}
                {% set ns.out = ns.out + [
                  (ns.cur_start | timestamp_custom('%H:%M', true))
                  ~ '-'
                  ~ (ns.cur_end | timestamp_custom('%H:%M', true))
                ] %}
                {% set ns.cur_start = start_ts %}
                {% set ns.cur_end = end_ts %}
              {% endif %}
            {% endfor %}

            {% if ns.cur_start is not none %}
              {% set ns.out = ns.out + [
                (ns.cur_start | timestamp_custom('%H:%M', true))
                ~ '-'
                ~ (ns.cur_end | timestamp_custom('%H:%M', true))
              ] %}
            {% endif %}

            {{ ns.out | join(', ') if ns.out | count > 0 else '-' }}
          {% endif %}
      - name: "EV Next Charge Window Real"
        unique_id: ev_next_charge_window_real
        state: >
          {% set slots = states('sensor.ev_charge_windows_real') %}

          {% if slots in ['unknown', 'unavailable', '', '-'] %}
            -
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ns = namespace(found='-') %}

            {% for slot in slots.split(',') %}
              {% set s = slot.strip() %}

              {% if '-' in s %}
                {% set start_txt = s.split('-')[0].strip() %}
                {% set end_txt = s.split('-')[1].strip() %}

                {% set start_dt = today_at(start_txt ~ ':00') %}
                {% set end_dt = today_at(end_txt ~ ':00') %}

                {% if end_dt <= start_dt %}
                  {% set end_dt = end_dt + timedelta(days=1) %}
                {% endif %}

                {% set start_ts = as_timestamp(start_dt) %}
                {% set end_ts = as_timestamp(end_dt) %}

                {% if end_ts > now_ts and ns.found == '-' %}
                  {% set ns.found = start_dt.strftime('%H:%M') ~ '-' ~ end_dt.strftime('%H:%M') %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {{ ns.found }}
          {% endif %}
          
      - name: "EV Target Ampere Raw"
        unique_id: ev_target_ampere_raw
        unit_of_measurement: "A"
        state: >
          {% set Y = states('sensor.stromligning_current_price_vat') | float(0) %}
          {% set ref = states('sensor.ev_night_reference_price_real') | float(999) %}
          {% set margin = 0.05 %}
          {% set target = ref - margin %}
          {% set X = states('sensor.ev_solar_surplus_before_car') | float(0) %}
          {% set Xavg = states('sensor.ev_solar_surplus_before_car_average_15m') | float(0) %}
          {% set decision = states('sensor.ev_charge_decision') %}
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set kw_per_amp = 11 / 16 %}
          {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}

          {% if mode == 'Charge Now' %}
            16

          {% elif mode == 'Sun Optimized' %}
            {% set A = (Xavg / kw_per_amp) | int(0) %}
            {% if A < min_amp %}
              0
            {% elif A > 16 %}
              16
            {% else %}
              {{ A }}
            {% endif %}

          {% elif Y <= target %}
            16

          {% elif X <= 0 %}
            {% if decision == 'LAD' %}
              16
            {% else %}
              0
            {% endif %}

          {% else %}
            {% set denom = 1 - (target / Y) %}

            {% if denom <= 0 %}
              16
            {% else %}
              {% set Amax = (16 * X) / (11 * denom) %}
              {% set A = Amax | int(0) %}

              {% if A < min_amp %}
                0
              {% elif A > 16 %}
                16
              {% else %}
                {{ A }}
              {% endif %}
            {% endif %}
          {% endif %}

        attributes:
          solar_surplus_kw: >
            {{ states('sensor.ev_solar_surplus_before_car') | float(0) | round(2) }}

          solar_surplus_avg_15m_kw: >
            {{ states('sensor.ev_solar_surplus_before_car_average_15m') | float(0) | round(2) }}

          grid_price: >
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}

          target_price: >
            {{ (states('sensor.ev_night_reference_price_real') | float(999) - 0.05) | round(3) }}

          mode: >
            {{ states('input_select.ev_charge_mode') }}

          decision: >
            {{ states('sensor.ev_charge_decision') }}

          amp_floor_from_avg: >
            {% set Xavg = states('sensor.ev_solar_surplus_before_car_average_15m') | float(0) %}
            {% set kw_per_amp = 11 / 16 %}
            {{ (Xavg / kw_per_amp) | int(0) }}

          reason: >
            {% set mode = states('input_select.ev_charge_mode') %}
            {% set Y = states('sensor.stromligning_current_price_vat') | float(0) %}
            {% set ref = states('sensor.ev_night_reference_price_real') | float(999) %}
            {% set target = ref - 0.05 %}
            {% set X = states('sensor.ev_solar_surplus_before_car') | float(0) %}
            {% set Xavg = states('sensor.ev_solar_surplus_before_car_average_15m') | float(0) %}
            {% set A = states('sensor.ev_target_ampere_raw') | int(0) %}
            {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}

            {% if mode == 'Charge Now' %}
              Charge Now → 16A
            {% elif mode == 'Sun Optimized' and A >= 6 %}
              Sun Optimized from 15m solar average
            {% elif mode == 'Sun Optimized' %}
              Sun Optimized waiting for >= {{ min_amp }}A solar average
            {% elif Y <= target %}
              Grid below target → 16A
            {% elif X <= 0 and states('sensor.ev_charge_decision') == 'LAD' %}
              Slot charging without solar → 16A
            {% elif X <= 0 %}
              No solar → no charging
            {% elif A < 6 %}
              Solar insufficient vs target price
            {% else %}
              Solar meets target price
            {% endif %}

      - name: "EV Target Ampere Stable"
        unique_id: ev_target_ampere_stable
        unit_of_measurement: "A"
        state: >
          {% set raw = states('sensor.ev_target_ampere_raw') | int(0) %}
          {% set old = states('input_number.ev_last_sent_ampere') | int(0) %}
          {% set mode = states('input_select.ev_charge_mode') %}

          {% if mode == 'Charge Now' %}
            {{ raw }}
          {% elif raw == 0 %}
            0
          {% elif old < 6 and raw >= 6 %}
            {{ raw }}
          {% elif old >= 6 and raw == 0 %}
            0
          {% elif (raw - old) | abs >= 2 %}
            {{ raw }}
          {% else %}
            {{ old }}
          {% endif %}

        attributes:
          raw: >
            {{ states('sensor.ev_target_ampere_raw') | int(0) }}
          last_sent_ampere: >
            {{ states('input_number.ev_last_sent_ampere') | int(0) }}
          mode: >
            {{ states('input_select.ev_charge_mode') }}
          reason: >
            {% set raw = states('sensor.ev_target_ampere_raw') | int(0) %}
            {% set old = states('input_number.ev_last_sent_ampere') | int(0) %}
            {% set mode = states('input_select.ev_charge_mode') %}

            {% if mode == 'Charge Now' %}
              Charge Now bypass
            {% elif raw == 0 %}
              Stop request
            {% elif old < 6 and raw >= 6 %}
              Start allowed immediately
            {% elif old >= 6 and raw == 0 %}
              Stop allowed immediately
            {% elif (raw - old) | abs >= 2 %}
              Delta large enough
            {% else %}
              Hold previous ampere
            {% endif %}

      - name: "EV Target Ampere Effective"
        unique_id: ev_target_ampere_effective
        unit_of_measurement: "A"
        state: >
          {% set new = states('sensor.ev_target_ampere_stable') | int(0) %}
