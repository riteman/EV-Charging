# Loads default set of integrations. Do not remove.
default_config:

logbook:

utility_meter:
  ev_solar_energy_to_car_estimate_today:
    source: sensor.ev_solar_energy_to_car_estimate
    cycle: daily

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  
lovelace:
  mode: storage
  dashboards:
    ev-dashboard:
      mode: yaml
      title: EV Dashboard
      icon: mdi:car-electric
      show_in_sidebar: true
      filename: dashboards/ev_dashboard.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_select:
  ev_charge_mode:
    name: EV Charge Mode
    options:
      - Auto
      - Stop
      - Charge Now
      - Monta Guest
      - Sun Optimized
    initial: Auto

  ev_guest_target_quick:
    name: Guest Target Quick
    options:
      - "80"
      - "100"
    initial: "80"

  intellicharge_desired_mode:
    name: IntelliCharge Mode (Desired)
    options:
      - Smart
      - Allow Always
    initial: Smart

  intellicharge_pre_ev_mode:
    name: IntelliCharge Pre-EV Mode
    options:
      - Smart
      - Allow Always

input_boolean:
  ev_ha_control_enabled:
    name: EV HA Control Enabled
    icon: mdi:robot
    
  ev_guest_target_100:
    name: Lad til 100%

  ev_session_active:
    name: EV Session Active
    icon: mdi:car-electric
    
  ev_simulation_mode:
    name: EV Simulation Mode
    icon: mdi:test-tube

  intellicharge_smart_enabled:
    name: IntelliCharge Smart Enabled
    icon: mdi:solar-power

  intellicharge_overridden_by_ev:
    name: IntelliCharge overridden by EV

  ev_intellicharge_settling:
   name: "EV IntelliCharge Settling (internal)"

  ev_start_delay_active:
    name: EV Start Delay Active 

input_datetime:
  ev_planned_ready_by:
    name: EV Planned Ready By
    has_date: true
    has_time: true

  ev_session_ready_by:
    name: EV Session Ready By
    has_date: true
    has_time: true

  intellicharge_override_started_at:
    name: IntelliCharge Override Started At
    has_date: true
    has_time: true  

  ev_intellicharge_last_change:
    name: "EV IntelliCharge Last Change (internal)"
    has_date: true
    has_time: true

  ev_segment_started_at:
    name: EV Segment Started At
    has_date: true
    has_time: true  

  ev_session_started_at:
    name: EV Session Started At
    has_date: true
    has_time: true

  ev_session_finished_at:
    name: EV Session Finished At
    has_date: true
    has_time: true      

input_number:
  ev_guest_planned_start_soc:
    name: Guest Planned Start SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 0
    mode: box

  ev_guest_planned_target_soc:
    name: Guest Planned Target SOC
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
    mode: box

  ev_guest_planned_battery_kwh:
    name: Guest Planned Battery kWh
    min: 10
    max: 120
    step: 0.5
    unit_of_measurement: "kWh"
    initial: 77
    mode: box

  ev_session_start_soc:
    name: EV Session Start SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 0
    mode: box

  ev_session_target_soc:
    name: EV Session Target SOC
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
    mode: box

  ev_session_battery_kwh:
    name: EV Session Battery kWh
    min: 10
    max: 120
    step: 0.5
    unit_of_measurement: "kWh"
    initial: 77
    mode: box

  ev_charge_power_kw:
    name: EV Charge Power kW
    min: 1
    max: 22
    step: 0.1
    unit_of_measurement: "kW"
    initial: 11
    mode: box

  ev_price_start_margin:
    name: EV Start Margin
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "DKK/kWh"
    initial: 0.08
    mode: box

  ev_price_stop_margin:
    name: EV Stop Margin
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "DKK/kWh"
    initial: 0.12
    mode: box
    
  ev_manual_ampere:
    name: EV Manual Ampere
    min: 6
    max: 16
    step: 1
    unit_of_measurement: "A"
    initial: 10
    mode: box  

  ev_last_sent_ampere:
    name: EV Last Sent Ampere
    min: 0
    max: 32
    step: 1  

  ev_segment_start_energy_kwh:
    name: EV Segment Start Energy
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: kWh
    mode: box

  ev_segment_ampere:
    name: EV Segment Ampere
    min: 0
    max: 32
    step: 1
    unit_of_measurement: A
    mode: box  

  ev_session_energy_latched_kwh:
      name: EV Session Energy Latched
      min: 0
      max: 200
      step: 0.01
      unit_of_measurement: kWh
      mode: box

  ev_session_max_ampere:
    name: EV Session Max Ampere
    min: 0
    max: 32
    step: 1
    unit_of_measurement: A
    mode: box    

  ev_sun_optimized_latched_export_kw:
    name: EV Sun Optimized Latched Export
    min: 0
    max: 50
    step: 0.01
    unit_of_measurement: kW
    mode: box  

  ev_min_charge_ampere:
    name: EV Minimum Charge Ampere
    min: 6
    max: 10
    step: 1
    unit_of_measurement: A
    mode: box  

input_text:
  ev_last_segment_summary:
    name: EV Last Segment Summary
    max: 255   

  ev_session_mode_latched:
      name: EV Session Mode Latched
      max: 50

  ev_last_session_summary:
    name: EV Last Session Summary
    max: 255 

   

sensor:
    - platform: statistics
      name: Grid Export Power Average 2m
      entity_id: sensor.grid_export_power
      state_characteristic: mean
      max_age:
        minutes: 2


    - platform: statistics
      name: EV Solar Surplus Before Car Average 15m
      unique_id: ev_solar_surplus_before_car_average_15m
      entity_id: sensor.ev_solar_surplus_before_car
      state_characteristic: mean
      sampling_size: 900
      max_age:
        minutes: 15
      
    - platform: integration
      source: sensor.ev_solar_power_to_car_estimate
      name: EV Solar Energy To Car Estimate
      unit_prefix: k
      round: 2
      method: trapezoidal
      
template:
    - sensor:    
      - name: "Shelly Grid Power Raw"
        unique_id: shelly_grid_power_raw
        unit_of_measurement: "W"
        state: >
          {{
            (
              states('sensor.shellyem3_483fdac37c06_phase_a_power') | float(0)
              + states('sensor.shellyem3_483fdac37c06_phase_b_power') | float(0)
              + states('sensor.shellyem3_483fdac37c06_phase_c_power') | float(0)
            ) | round(2)
          }}

      - name: "EV Solar Power to Car"
        unique_id: ev_solar_power_to_car
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        state: >
          {% set export = [states('sensor.grid_export_power_average_2m_safe') | float(0), 0] | max %}
          {% set amp = states('sensor.ev_target_ampere_stable') | float(0) %}
          {% set charger_power = 11 * (amp / 16) %}
          {{ [export, charger_power] | min | round(2) }}

  #    - name: "EV Time Debug"
  #      state: >
  #        Ready: {{ states('input_datetime.ev_session_ready_by') }}
  #        Now: {{ now() }}
  #        Ready_ts: {{ as_timestamp(states('input_datetime.ev_session_ready_by')) }}
  #        Now_ts: {{ as_timestamp(now()) }}
          
      - name: "EV Grid Power to Car"
        unique_id: ev_grid_power_to_car
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        state: >
          {% set total = 11 * (states('sensor.ev_target_ampere_stable') | float(0) / 16) %}
          {% set solar = states('sensor.ev_solar_power_to_car') | float(0) %}
          {{ [total - solar, 0] | max | round(2) }}
          
      - name: "EV Solar Fraction"
        unique_id: ev_solar_fraction
        state_class: measurement
        unit_of_measurement: "%"
        state: >
          {% set total = 11 * (states('sensor.ev_target_ampere_stable') | float(0) / 16) %}
          {% set solar = states('sensor.ev_solar_power_to_car') | float(0) %}
          {% if total > 0 %}
            {{ (100 * solar / total) | round(0) }}
          {% else %}
            0
          {% endif %}
    
      - name: "EV Remaining Energy kWh"
        unique_id: ev_remaining_energy_kwh
        unit_of_measurement: "kWh"
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}

          {% if mode == 'Monta Guest' %}
            {% set start_soc = states('input_number.ev_session_start_soc') | float(0) %}
            {% set target_soc = states('input_number.ev_session_target_soc') | float(80) %}
            {% set batt = states('input_number.ev_session_battery_kwh') | float(77) %}
            {% set delta_soc = [target_soc - start_soc, 0] | max %}
            {{ (batt * delta_soc / 100) | round(1) }}
          {% else %}
            {% set current_soc = states('sensor.battery_level') | float(0) %}
            {% set target_soc = states('input_number.ev_session_target_soc') | float(80) %}
            {% set batt = states('input_number.ev_session_battery_kwh') | float(77) %}
            {% set delta_soc = [target_soc - current_soc, 0] | max %}
            {{ (batt * delta_soc / 100) | round(1) }}
          {% endif %}

      - name: "EV Remaining Hours Needed"
        unique_id: ev_remaining_hours_needed
        unit_of_measurement: "h"
        state: >
          {% set remaining = states('sensor.ev_remaining_energy_live_kwh') | float(0) %}
          {% set power = states('input_number.ev_charge_power_kw') | float(11) %}
          {% set efficiency = 0.92 %}

          {% if power > 0 %}
            {{ (remaining / (power * efficiency)) | round(2) }}
          {% else %}
            0
          {% endif %}

        attributes:
          mode: >
            {{ states('input_select.ev_charge_mode') }}

          remaining_live_kwh: >
            {{ states('sensor.ev_remaining_energy_live_kwh') | float(0) | round(2) }}

          charge_power_kw: >
            {{ states('input_number.ev_charge_power_kw') | float(11) | round(2) }}

          efficiency: 0.92

      - name: "EV Hours Until Ready"
        unique_id: ev_hours_until_ready
        unit_of_measurement: "h"
        state: >
          {% set ready = states('input_datetime.ev_session_ready_by') %}
          {% if ready in ['unknown', 'unavailable', '', 'none'] %}
            0
          {% else %}
            {% set delta = (as_timestamp(ready) - as_timestamp(now())) / 3600 %}
            {{ [delta, 0] | max | round(2) }}
          {% endif %}
          

      - name: "EV Remaining Energy Live kWh"
        unique_id: ev_remaining_energy_live_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set session_energy = states('sensor.eh45khwp_session_energy') | float(0) %}

          {% if mode == 'Monta Guest' %}
            {% set start_soc = states('input_number.ev_guest_planned_start_soc') | float(0) %}
            {% set target_soc = states('input_number.ev_guest_planned_target_soc') | float(0) %}
            {% set battery_kwh = states('input_number.ev_guest_planned_battery_kwh') | float(0) %}
            {% set required = battery_kwh * ([target_soc - start_soc, 0] | max) / 100 %}
            {{ [required - session_energy, 0] | max | round(2) }}
          {% else %}
            {{ states('sensor.ev_remaining_energy_kwh') | float(0) | round(2) }}
          {% endif %}

        attributes:
          mode: >
            {{ states('input_select.ev_charge_mode') }}

          session_energy_kwh: >
            {{ states('sensor.eh45khwp_session_energy') | float(0) | round(2) }}

          guest_start_soc: >
            {{ states('input_number.ev_guest_planned_start_soc') | float(0) | round(1) }}

          guest_target_soc: >
            {{ states('input_number.ev_guest_planned_target_soc') | float(0) | round(1) }}

          guest_battery_kwh: >
            {{ states('input_number.ev_guest_planned_battery_kwh') | float(0) | round(1) }}

          required_kwh: >
            {% if is_state('input_select.ev_charge_mode', 'Monta Guest') %}
              {% set start_soc = states('input_number.ev_guest_planned_start_soc') | float(0) %}
              {% set target_soc = states('input_number.ev_guest_planned_target_soc') | float(0) %}
              {% set battery_kwh = states('input_number.ev_guest_planned_battery_kwh') | float(0) %}
              {{ (battery_kwh * ([target_soc - start_soc, 0] | max) / 100) | round(2) }}
            {% else %}
              {{ states('sensor.ev_remaining_energy_kwh') | float(0) | round(2) }}
            {% endif %}

          remaining_live_kwh: >
            {{ states('sensor.ev_remaining_energy_live_kwh') | float(0) | round(2) }}

          source: >
            {% if is_state('input_select.ev_charge_mode', 'Monta Guest') %}
              guest_inputs_minus_session_energy
            {% else %}
              car_soc_based
            {% endif %}

      - name: "EV Night Reference Price Real"
        unique_id: ev_night_reference_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set session_ready = states('input_datetime.ev_session_ready_by') %}
          {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

          {% set ready = session_ready %}
          {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
            {% set ready = planned_ready %}
          {% endif %}

          {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set ns = namespace(candidates=[], remaining=need, total_cost=0, selected=0) %}

            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% set end_ts = start_ts + 3600 %}
              {% set overlap_start = [start_ts, now_ts] | max %}
              {% set overlap_end = [end_ts, ready_ts] | min %}
              {% set overlap = (overlap_end - overlap_start) / 3600 %}

              {% if overlap > 0 %}
                {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
              {% endif %}
            {% endfor %}

            {% set sorted_candidates = ns.candidates | sort %}

            {% for price, slot_start_ts, avail in sorted_candidates %}
              {% if ns.remaining > 0 %}
                {% set used = [avail, ns.remaining] | min %}
                {% set ns.remaining = ns.remaining - used %}
                {% set ns.selected = ns.selected + used %}
                {% set ns.total_cost = ns.total_cost + (used * price) %}
              {% endif %}
            {% endfor %}

            {% if ns.selected > 0 %}
              {{ (ns.total_cost / ns.selected) | round(3) }}
            {% else %}
              {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
            {% endif %}
          {% endif %}

        attributes:
          ready_session: >
            {{ states('input_datetime.ev_session_ready_by') }}

          ready_planned: >
            {{ states('input_datetime.ev_planned_ready_by') }}

          ready_used: >
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}
            {% set ready = session_ready %}
            {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
              {% set ready = planned_ready %}
            {% endif %}
            {{ ready }}

          fallback_used: >
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% if session_ready in ['unknown', 'unavailable', ''] or as_timestamp(session_ready) <= as_timestamp(now()) %}
              true
            {% else %}
              false
            {% endif %}

          need_hours: >
            {{ states('sensor.ev_remaining_hours_needed') }}

          current_price: >
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}

          selected_hours: >
            {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
              + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
            {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

            {% set ready = session_ready %}
            {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
              {% set ready = planned_ready %}
            {% endif %}

            {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
              0
            {% else %}
              {% set now_ts = as_timestamp(now()) %}
              {% set ready_ts = as_timestamp(ready) %}
              {% set ns = namespace(candidates=[], remaining=need, selected=0) %}

              {% for item in prices %}
                {% set start_ts = as_timestamp(item.start) %}
                {% set end_ts = start_ts + 3600 %}
                {% set overlap_start = [start_ts, now_ts] | max %}
                {% set overlap_end = [end_ts, ready_ts] | min %}
                {% set overlap = (overlap_end - overlap_start) / 3600 %}

                {% if overlap > 0 %}
                  {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
                {% endif %}
              {% endfor %}

              {% for price, slot_start_ts, avail in ns.candidates | sort %}
                {% if ns.remaining > 0 %}
                  {% set used = [avail, ns.remaining] | min %}
                  {% set ns.remaining = ns.remaining - used %}
                  {% set ns.selected = ns.selected + used %}
                {% endif %}
              {% endfor %}

              {{ ns.selected | round(2) }}
            {% endif %}

          selected_cost: >
            {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
              + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
            {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

            {% set ready = session_ready %}
            {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
              {% set ready = planned_ready %}
            {% endif %}

            {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
              0
            {% else %}
              {% set now_ts = as_timestamp(now()) %}
              {% set ready_ts = as_timestamp(ready) %}
              {% set ns = namespace(candidates=[], remaining=need, total_cost=0) %}

              {% for item in prices %}
                {% set start_ts = as_timestamp(item.start) %}
                {% set end_ts = start_ts + 3600 %}
                {% set overlap_start = [start_ts, now_ts] | max %}
                {% set overlap_end = [end_ts, ready_ts] | min %}
                {% set overlap = (overlap_end - overlap_start) / 3600 %}

                {% if overlap > 0 %}
                  {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
                {% endif %}
              {% endfor %}

              {% for price, slot_start_ts, avail in ns.candidates | sort %}
                {% if ns.remaining > 0 %}
                  {% set used = [avail, ns.remaining] | min %}
                  {% set ns.remaining = ns.remaining - used %}
                  {% set ns.total_cost = ns.total_cost + (used * price) %}
                {% endif %}
              {% endfor %}

              {{ ns.total_cost | round(3) }}
            {% endif %}

      - name: "EV Next Selected Slot Start"
        unique_id: ev_next_selected_slot_start
        state: >
          {% set s = states('sensor.ev_charge_windows_real') %}
          {% if s in ['unknown', 'unavailable', '', 'none', '-'] %}
            {{ none }}
          {% else %}
            {% set first = s.split(',')[0] | trim %}
            {% if '-' in first %}
              {{ first.split('-')[0] | trim }}
            {% else %}
              {{ none }}
            {% endif %}
          {% endif %}
        attributes:
          source: >
            sensor.ev_charge_windows_real
          comment: >
            Legacy compatibility sensor. Prefer sensor.ev_charge_windows_real directly.
            
      - name: "EV Price Delta Real"
        unique_id: ev_price_delta_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set v = states('sensor.ev_virtual_day_price_real') %}
          {% set r = states('sensor.ev_night_reference_price_real') %}
          {% if is_number(v) and is_number(r) %}
            {{ (v | float - r | float) | round(3) }}
          {% else %}
            {{ none }}
          {% endif %}

            
      - name: "EV Charge Decision"
        unique_id: ev_charge_decision
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
          {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
          {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
          {% set power_kw = states('sensor.eh45khwp_power') | float(0) %}
          {% set currently_charging = power_kw > 0.5 %}
          {% set raw = states('sensor.ev_target_ampere_raw') | int(0) %}
          {% set effective = states('sensor.ev_target_ampere_effective') | int(0) %}
          {% set next_window = states('sensor.ev_next_charge_window_real') %}
          {% set ns = namespace(active_window=false, future_window=false) %}

          {% if next_window not in ['unknown', 'unavailable', '', '-', 'none'] and '-' in next_window %}
            {% set start_txt = next_window.split('-')[0].strip() %}
            {% set end_txt = next_window.split('-')[1].strip() %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set start_ts = as_timestamp(today ~ ' ' ~ start_txt ~ ':00') %}
            {% set end_ts = as_timestamp(today ~ ' ' ~ end_txt ~ ':00') %}
            {% if start_ts is not none and end_ts is not none %}
              {% set ns.active_window = now().timestamp() >= start_ts and now().timestamp() < end_ts %}
              {% set ns.future_window = now().timestamp() < start_ts %}
            {% endif %}
          {% endif %}

          {% if not enabled %}
            VENT
          {% elif not cable %}
            VENT
          {% elif not session %}
            VENT
          {% elif complete %}
            VENT
          {% elif mode == 'Stop' %}
            VENT
          {% elif mode == 'Charge Now' %}
            LAD
          {% elif mode == 'Sun Optimized' %}
            {% if currently_charging %}
              LAD
            {% elif raw >= 6 %}
              LAD
            {% else %}
              VENT
            {% endif %}
          {% elif mode == 'Monta Guest' and currently_charging %}
            LAD
          {% elif deadline %}
            LAD
          {% elif currently_charging %}
            LAD
          {% elif raw >= 6 %}
            LAD
          {% elif effective >= 6 %}
            LAD
          {% elif ns.active_window %}
            LAD
          {% else %}
            VENT
          {% endif %}

        attributes:
          reason: >
            {% set mode = states('input_select.ev_charge_mode') %}
            {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
            {% set session = is_state('input_boolean.ev_session_active', 'on') %}
            {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
            {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
            {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
            {% set power_kw = states('sensor.eh45khwp_power') | float(0) %}
            {% set currently_charging = power_kw > 0.5 %}
            {% set raw = states('sensor.ev_target_ampere_raw') | int(0) %}
            {% set effective = states('sensor.ev_target_ampere_effective') | int(0) %}
            {% set next_window = states('sensor.ev_next_charge_window_real') %}
            {% set ns = namespace(active_window=false, future_window=false) %}

            {% if next_window not in ['unknown', 'unavailable', '', '-', 'none'] and '-' in next_window %}
              {% set start_txt = next_window.split('-')[0].strip() %}
              {% set end_txt = next_window.split('-')[1].strip() %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% set start_ts = as_timestamp(today ~ ' ' ~ start_txt ~ ':00') %}
              {% set end_ts = as_timestamp(today ~ ' ' ~ end_txt ~ ':00') %}
              {% if start_ts is not none and end_ts is not none %}
                {% set ns.active_window = now().timestamp() >= start_ts and now().timestamp() < end_ts %}
                {% set ns.future_window = now().timestamp() < start_ts %}
              {% endif %}
            {% endif %}

            {% if not enabled %}
              HA off
            {% elif not cable %}
              No cable
            {% elif not session %}
              No session
            {% elif complete %}
              Complete
            {% elif mode == 'Stop' %}
              Stop
            {% elif mode == 'Charge Now' %}
              Charge Now
            {% elif mode == 'Sun Optimized' and currently_charging %}
              Sun Optimized charging
            {% elif mode == 'Sun Optimized' and raw >= 6 %}
              Sun Optimized solar average allows charging
            {% elif mode == 'Sun Optimized' %}
              Sun Optimized waiting for solar
            {% elif deadline %}
              Deadline
            {% elif currently_charging %}
              Charging now
            {% elif raw >= 6 %}
              Raw ampere allows charging
            {% elif effective >= 6 %}
              Effective ampere allows charging
            {% elif ns.active_window %}
              Active charge window
            {% elif ns.future_window %}
              Waiting for future window
            {% else %}
              Waiting better conditions
            {% endif %}

          mode: >
            {{ states('input_select.ev_charge_mode') }}

          enabled: >
            {{ is_state('input_boolean.ev_ha_control_enabled', 'on') }}

          session_active: >
            {{ is_state('input_boolean.ev_session_active', 'on') }}

          cable_connected: >
            {{ is_state('binary_sensor.ev_cable_connected_effective', 'on') }}

          deadline_risk: >
            {{ is_state('binary_sensor.ev_deadline_risk', 'on') }}

          session_complete: >
            {{ is_state('binary_sensor.ev_session_complete', 'on') }}

          currently_charging: >
            {{ states('sensor.eh45khwp_power') | float(0) > 0.5 }}

          raw_ampere: >
            {{ states('sensor.ev_target_ampere_raw') | int(0) }}

          effective_ampere: >
            {{ states('sensor.ev_target_ampere_effective') | int(0) }}

          next_charge_window: >
            {{ states('sensor.ev_next_charge_window_real') }}

          charger_power_kw: >
            {{ states('sensor.eh45khwp_power') | float(0) | round(2) }}    
      

      - name: "EV Solar Surplus Before Car"
