            {% set soc = states('sensor.battery_level') | float(0) %}
            {% set car_target = states('sensor.battery_target_charge_level') | float(0) %}
            {% set session_target = states('input_number.ev_session_target_soc') | float(0) %}
            {% set target = car_target if car_target > 0 else session_target %}
            {% set target_reached = target > 0 and soc >= (target - 0.5) %}

            {% if target_reached and mode in ['Auto', 'Charge Now', 'Sun Optimized'] %}
              Bilen har nået target SOC.
            {% elif charging %}
              Bilen lader fysisk lige nu.
            {% elif start_delay %}
              Systemet har besluttet at lade og afventer start-delay.
            {% elif decision == 'LAD' and effective < 6 %}
              Systemet vil gerne lade, men den effektive ampere er under minimum {{ min_amp }}A.
            {% elif decision == 'LAD' and charger_on and no_current_reason == 'pending_authorization' %}
