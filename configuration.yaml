          {% set ev_kw = states('sensor.eh45khwp_power') | float(0) %}
          {% set charging = ev_kw > 0.5 %}

          {% if charging %}
            {{ [grid_kw + ev_kw, 0] | max | round(2) }}
          {% else %}
            {{ [grid_kw, 0] | max | round(2) }}
          {% endif %}

        attributes:
          grid_export_net_kw: >
            {{ states('sensor.grid_export_power_average_2m_safe') | float(0) | round(2) }}

          ev_power_kw: >
            {{ states('sensor.eh45khwp_power') | float(0) | round(2) }}

          charging_now: >
            {{ states('sensor.eh45khwp_power') | float(0) > 0.5 }}

          decision: >
            {{ states('sensor.ev_charge_decision') }}

          target_ampere: >
            {{ states('sensor.ev_target_ampere_effective') | int(0) }}

          explanation: >
            {% set grid_kw = states('sensor.grid_export_power_average_2m_safe') | float(0) %}
            {% set ev_kw = states('sensor.eh45khwp_power') | float(0) %}
            {% set charging = ev_kw > 0.5 %}

            {% if charging %}
              Solar surplus before EV load estimated as net grid flow plus actual EV charging power
            {% else %}
              No active EV charging, so surplus equals current positive net export only
            {% endif %}
                
      - name: "EV Virtual Day Price Real"
        unique_id: ev_virtual_day_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set charger_power = states('input_number.ev_charge_power_kw') | float(11) %}
          {% set settling = is_state('input_boolean.ev_intellicharge_settling', 'on') %}
          {% set price = states('sensor.stromligning_current_price_vat') | float(0) %}
          {% set export_raw = states('sensor.grid_export_power_average_2m_safe') %}
          {% set export_ok = export_raw not in ['unknown', 'unavailable', 'none', none, ''] %}

          {% if settling or not export_ok %}
            {{ price | round(3) }}
          {% else %}
            {% set export_kw = export_raw | float(0) %}
            {% set free_kw = [export_kw, charger_power] | min %}
            {% set net_kw = charger_power - free_kw %}

            {% if charger_power > 0 %}
              {{ (price * (net_kw / charger_power)) | round(3) }}
            {% else %}
              0
            {% endif %}
          {% endif %}
          
      - name: "Grid Export Power Average 2m Safe"
        unique_id: grid_export_power_average_2m_safe
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.grid_export_power_average_2m') | float(0) | round(2) }}     
     
      - name: "Grid Export Power"
        unique_id: grid_export_power
        unit_of_measurement: "kW"
        state: >
          {% set grid_w = states('sensor.shelly_grid_power_raw') | float(0) %}
          {{ (grid_w / 1000) | round(2) }} 

      - name: "EV Charge Power Mode"
        unique_id: ev_charge_power_mode
        state: >
          {% set amp = states('sensor.ev_target_ampere_effective') | int(0) %}
          {% set decision = states('sensor.ev_charge_decision') %}
