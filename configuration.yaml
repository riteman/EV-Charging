# Loads default set of integrations. Do not remove.
default_config:

logbook:

utility_meter:
  ev_solar_energy_to_car_estimate_today:
    source: sensor.ev_solar_energy_to_car_estimate
    cycle: daily

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  
lovelace:
  mode: storage
  dashboards:
    ev-dashboard:
      mode: yaml
      title: EV Dashboard
      icon: mdi:car-electric
      show_in_sidebar: true
      filename: dashboards/ev_dashboard.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_select:
  ev_charge_mode:
    name: EV Charge Mode
    options:
      - Auto
      - Stop
      - Charge Now
      - Monta Guest
    initial: Auto

  ev_guest_target_quick:
    name: Guest Target Quick
    options:
      - "80"
      - "100"
    initial: "80"

  intellicharge_desired_mode:
    name: IntelliCharge Mode (Desired)
    options:
      - Smart
      - Allow Always
    initial: Smart

  intellicharge_pre_ev_mode:
    name: IntelliCharge Pre-EV Mode
    options:
      - Smart
      - Allow Always

input_boolean:
  ev_ha_control_enabled:
    name: EV HA Control Enabled
    icon: mdi:robot
    
  ev_guest_target_100:
    name: Lad til 100%

  ev_session_active:
    name: EV Session Active
    icon: mdi:car-electric
    
  ev_simulation_mode:
    name: EV Simulation Mode
    icon: mdi:test-tube

  intellicharge_smart_enabled:
    name: IntelliCharge Smart Enabled
    icon: mdi:solar-power

  intellicharge_overridden_by_ev:
    name: IntelliCharge overridden by EV

input_datetime:
  ev_planned_ready_by:
    name: EV Planned Ready By
    has_date: true
    has_time: true

  ev_session_ready_by:
    name: EV Session Ready By
    has_date: true
    has_time: true

  intellicharge_override_started_at:
    name: IntelliCharge Override Started At
    has_date: true
    has_time: true  

input_number:
  ev_guest_planned_start_soc:
    name: Guest Planned Start SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 0
    mode: box

  ev_guest_planned_target_soc:
    name: Guest Planned Target SOC
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
    mode: box

  ev_guest_planned_battery_kwh:
    name: Guest Planned Battery kWh
    min: 10
    max: 120
    step: 0.5
    unit_of_measurement: "kWh"
    initial: 77
    mode: box

  ev_session_start_soc:
    name: EV Session Start SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 0
    mode: box

  ev_session_target_soc:
    name: EV Session Target SOC
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
    mode: box

  ev_session_battery_kwh:
    name: EV Session Battery kWh
    min: 10
    max: 120
    step: 0.5
    unit_of_measurement: "kWh"
    initial: 77
    mode: box

  ev_charge_power_kw:
    name: EV Charge Power kW
    min: 1
    max: 22
    step: 0.1
    unit_of_measurement: "kW"
    initial: 11
    mode: box

  ev_price_start_margin:
    name: EV Start Margin
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "DKK/kWh"
    initial: 0.08
    mode: box

  ev_price_stop_margin:
    name: EV Stop Margin
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "DKK/kWh"
    initial: 0.12
    mode: box
    
  ev_manual_ampere:
    name: EV Manual Ampere
    min: 6
    max: 16
    step: 1
    unit_of_measurement: "A"
    initial: 10
    mode: box  

sensor:
  - platform: rest
    name: "Shelly Grid Power Raw"
    resource: http://192.168.10.250/status
    value_template: "{{ value_json.total_power | float(0) }}"
    unit_of_measurement: "W"
    scan_interval: 10

  - platform: statistics
    name: Grid Export Power Average 2m
    entity_id: sensor.grid_export_power
    state_characteristic: mean
    max_age:
      minutes: 2
      
  - platform: integration
    source: sensor.ev_solar_power_to_car_estimate
    name: EV Solar Energy To Car Estimate
    unit_prefix: k
    round: 2
    method: trapezoidal
      
template:
    - sensor:    

      - name: "IntelliCharge Smart Sync Status"
        unique_id: intellicharge_smart_sync_status_text
        state: >
          {% set actual = states('sensor.ev_intellicharge_smart_status_2') | trim %}
          {% set desired = states('input_select.intellicharge_desired_mode') | trim %}

          {% if actual in ['unknown', 'unavailable', '', 'none', 'Ukendt']
                or desired in ['unknown', 'unavailable', '', 'none'] %}
            Initialiserer
          {% elif actual == desired %}
            Synkroniseret
          {% else %}
            Ikke synkroniseret
          {% endif %}
        icon: >
          {% set actual = states('sensor.ev_intellicharge_smart_status_2') | trim %}
          {% set desired = states('input_select.intellicharge_desired_mode') | trim %}
          {% if actual in ['unknown', 'unavailable', '', 'none', 'Ukendt']
                or desired in ['unknown', 'unavailable', '', 'none'] %}
            mdi:clock-outline
          {% elif actual == desired %}
            mdi:check-circle
          {% else %}
            mdi:alert-circle
          {% endif %}
        attributes:
          actual: >
            {{ states('sensor.ev_intellicharge_smart_status_2') }}
          desired: >
            {{ states('input_select.intellicharge_desired_mode') }}  

      - name: "EV Solar Power to Car"
        unique_id: ev_solar_power_to_car
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        state: >
          {% set export = [states('sensor.grid_export_power_average_2m_safe') | float(0), 0] | max %}
          {% set amp = states('sensor.ev_target_ampere_stable') | float(0) %}
          {% set charger_power = 11 * (amp / 16) %}
          {{ [export, charger_power] | min | round(2) }}

      - name: "EV Time Debug"
        state: >
          Ready: {{ states('input_datetime.ev_session_ready_by') }}
          Now: {{ now() }}
          Ready_ts: {{ as_timestamp(states('input_datetime.ev_session_ready_by')) }}
          Now_ts: {{ as_timestamp(now()) }}
          
      - name: "EV Grid Power to Car"
        unique_id: ev_grid_power_to_car
        device_class: power
        state_class: measurement
        unit_of_measurement: "kW"
        state: >
          {% set total = 11 * (states('sensor.ev_target_ampere_stable') | float(0) / 16) %}
          {% set solar = states('sensor.ev_solar_power_to_car') | float(0) %}
          {{ [total - solar, 0] | max | round(2) }}
          
      - name: "EV Solar Fraction"
        unique_id: ev_solar_fraction
        state_class: measurement
        unit_of_measurement: "%"
        state: >
          {% set total = 11 * (states('sensor.ev_target_ampere_stable') | float(0) / 16) %}
          {% set solar = states('sensor.ev_solar_power_to_car') | float(0) %}
          {% if total > 0 %}
            {{ (100 * solar / total) | round(0) }}
          {% else %}
            0
          {% endif %}
    
      - name: "EV Remaining Energy kWh"
        unique_id: ev_remaining_energy_kwh
        unit_of_measurement: "kWh"
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}

          {% if mode == 'Monta Guest' %}
            {% set start_soc = states('input_number.ev_session_start_soc') | float(0) %}
            {% set target_soc = states('input_number.ev_session_target_soc') | float(80) %}
            {% set batt = states('input_number.ev_session_battery_kwh') | float(77) %}
            {% set delta_soc = [target_soc - start_soc, 0] | max %}
            {{ (batt * delta_soc / 100) | round(1) }}
          {% else %}
            {% set current_soc = states('sensor.battery_level') | float(0) %}
            {% set target_soc = states('input_number.ev_session_target_soc') | float(80) %}
            {% set batt = states('input_number.ev_session_battery_kwh') | float(77) %}
            {% set delta_soc = [target_soc - current_soc, 0] | max %}
            {{ (batt * delta_soc / 100) | round(1) }}
          {% endif %}

      - name: "EV Remaining Hours Needed"
        unique_id: ev_remaining_hours_needed
        unit_of_measurement: "h"
        state: >
          {% set remaining = states('sensor.ev_remaining_energy_kwh') | float(0) %}
          {% set power = states('input_number.ev_charge_power_kw') | float(11) %}
          {% set efficiency = 0.92 %}
          {% if power > 0 %}
            {{ (remaining / (power * efficiency)) | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "EV Hours Until Ready"
        unique_id: ev_hours_until_ready
        unit_of_measurement: "h"
        state: >
          {% set ready = states('input_datetime.ev_session_ready_by') %}
          {% if ready in ['unknown', 'unavailable', '', 'none'] %}
            0
          {% else %}
            {% set delta = (as_timestamp(ready) - as_timestamp(now())) / 3600 %}
            {{ [delta, 0] | max | round(2) }}
          {% endif %}
          

      - name: "EV Remaining Energy Live kWh"
        unique_id: ev_remaining_energy_live_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set required = states('sensor.ev_remaining_energy_kwh') | float(0) %}
          {% set session_energy = states('sensor.eh45khwp_session_energy') | float(0) %}

          {% if mode == 'Monta Guest' %}
            {{ [required - session_energy, 0] | max | round(2) }}
          {% else %}
            {{ required | round(2) }}
          {% endif %}

        attributes:
          mode: >
            {{ states('input_select.ev_charge_mode') }}

          required_kwh: >
            {{ states('sensor.ev_remaining_energy_kwh') | float(0) | round(2) }}

          session_energy_kwh: >
            {{ states('sensor.eh45khwp_session_energy') | float(0) | round(2) }}

          remaining_live_kwh: >
            {{ states('sensor.ev_remaining_energy_live_kwh') | float(0) | round(2) }}

          source: >
            {% if is_state('input_select.ev_charge_mode', 'Monta Guest') %}
              guest_required_minus_session_energy
            {% else %}
              car_soc_based
            {% endif %}

      - name: "EV Night Reference Price Real"
        unique_id: ev_night_reference_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set session_ready = states('input_datetime.ev_session_ready_by') %}
          {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

          {% set ready = session_ready %}
          {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
            {% set ready = planned_ready %}
          {% endif %}

          {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set ns = namespace(candidates=[], remaining=need, total_cost=0, selected=0) %}

            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% set end_ts = start_ts + 3600 %}
              {% set overlap_start = [start_ts, now_ts] | max %}
              {% set overlap_end = [end_ts, ready_ts] | min %}
              {% set overlap = (overlap_end - overlap_start) / 3600 %}

              {% if overlap > 0 %}
                {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
              {% endif %}
            {% endfor %}

            {% set sorted_candidates = ns.candidates | sort %}

            {% for price, slot_start_ts, avail in sorted_candidates %}
              {% if ns.remaining > 0 %}
                {% set used = [avail, ns.remaining] | min %}
                {% set ns.remaining = ns.remaining - used %}
                {% set ns.selected = ns.selected + used %}
                {% set ns.total_cost = ns.total_cost + (used * price) %}
              {% endif %}
            {% endfor %}

            {% if ns.selected > 0 %}
              {{ (ns.total_cost / ns.selected) | round(3) }}
            {% else %}
              {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
            {% endif %}
          {% endif %}

        attributes:
          ready_session: >
            {{ states('input_datetime.ev_session_ready_by') }}

          ready_planned: >
            {{ states('input_datetime.ev_planned_ready_by') }}

          ready_used: >
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}
            {% set ready = session_ready %}
            {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
              {% set ready = planned_ready %}
            {% endif %}
            {{ ready }}

          fallback_used: >
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% if session_ready in ['unknown', 'unavailable', ''] or as_timestamp(session_ready) <= as_timestamp(now()) %}
              true
            {% else %}
              false
            {% endif %}

          need_hours: >
            {{ states('sensor.ev_remaining_hours_needed') }}

          current_price: >
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}

          selected_hours: >
            {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
              + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
            {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

            {% set ready = session_ready %}
            {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
              {% set ready = planned_ready %}
            {% endif %}

            {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
              0
            {% else %}
              {% set now_ts = as_timestamp(now()) %}
              {% set ready_ts = as_timestamp(ready) %}
              {% set ns = namespace(candidates=[], remaining=need, selected=0) %}

              {% for item in prices %}
                {% set start_ts = as_timestamp(item.start) %}
                {% set end_ts = start_ts + 3600 %}
                {% set overlap_start = [start_ts, now_ts] | max %}
                {% set overlap_end = [end_ts, ready_ts] | min %}
                {% set overlap = (overlap_end - overlap_start) / 3600 %}

                {% if overlap > 0 %}
                  {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
                {% endif %}
              {% endfor %}

              {% for price, slot_start_ts, avail in ns.candidates | sort %}
                {% if ns.remaining > 0 %}
                  {% set used = [avail, ns.remaining] | min %}
                  {% set ns.remaining = ns.remaining - used %}
                  {% set ns.selected = ns.selected + used %}
                {% endif %}
              {% endfor %}

              {{ ns.selected | round(2) }}
            {% endif %}

          selected_cost: >
            {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
              + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
            {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
            {% set session_ready = states('input_datetime.ev_session_ready_by') %}
            {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

            {% set ready = session_ready %}
            {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
              {% set ready = planned_ready %}
            {% endif %}

            {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
              0
            {% else %}
              {% set now_ts = as_timestamp(now()) %}
              {% set ready_ts = as_timestamp(ready) %}
              {% set ns = namespace(candidates=[], remaining=need, total_cost=0) %}

              {% for item in prices %}
                {% set start_ts = as_timestamp(item.start) %}
                {% set end_ts = start_ts + 3600 %}
                {% set overlap_start = [start_ts, now_ts] | max %}
                {% set overlap_end = [end_ts, ready_ts] | min %}
                {% set overlap = (overlap_end - overlap_start) / 3600 %}

                {% if overlap > 0 %}
                  {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
                {% endif %}
              {% endfor %}

              {% for price, slot_start_ts, avail in ns.candidates | sort %}
                {% if ns.remaining > 0 %}
                  {% set used = [avail, ns.remaining] | min %}
                  {% set ns.remaining = ns.remaining - used %}
                  {% set ns.total_cost = ns.total_cost + (used * price) %}
                {% endif %}
              {% endfor %}

              {{ ns.total_cost | round(3) }}
            {% endif %}

      - name: "EV Selected Slots Real"
        unique_id: ev_selected_slots_real
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set session_ready = states('input_datetime.ev_session_ready_by') %}
          {% set planned_ready = states('input_datetime.ev_planned_ready_by') %}

          {% set ready = session_ready %}
          {% if ready in ['unknown', 'unavailable', ''] or as_timestamp(ready) <= as_timestamp(now()) %}
            {% set ready = planned_ready %}
          {% endif %}

          {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
            -
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set ns = namespace(candidates=[], remaining=need, selected=[]) %}

            {# Kandidater: pris først, derefter reel starttid, derefter overlap #}
            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% set end_ts = start_ts + 3600 %}
              {% set overlap_start = [start_ts, now_ts] | max %}
              {% set overlap_end = [end_ts, ready_ts] | min %}
              {% set overlap = (overlap_end - overlap_start) / 3600 %}

              {% if overlap > 0 %}
                {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
              {% endif %}
            {% endfor %}

            {% set sorted_candidates = ns.candidates | sort %}

            {# Vælg billigste slots indtil behovet er dækket #}
            {% for price, slot_start_ts, avail in sorted_candidates %}
              {% if ns.remaining > 0 %}
                {% set used = [avail, ns.remaining] | min %}
                {% set ns.remaining = ns.remaining - used %}
                {% set ns.selected = ns.selected + [(slot_start_ts, used, price)] %}
              {% endif %}
            {% endfor %}

            {# Sortér valgte slots kronologisk til visning #}
            {% set selected_sorted = ns.selected | sort(attribute=0) %}
            {% set ns2 = namespace(out=[]) %}

            {% for slot_start_ts, used, price in selected_sorted %}
              {% set used_min = (used * 60) | round(0) | int %}
              {% set start_txt = slot_start_ts | timestamp_custom('%H:%M', true) %}
              {% set ns2.out = ns2.out + [
                start_txt ~ ' (' ~ used_min ~ ' min @ ' ~ (price | round(5)) ~ ')'
              ] %}
            {% endfor %}

            {{ ns2.out | join(', ') if ns2.out | count > 0 else '-' }}
          {% endif %}
          
      - name: "EV Price Delta Real"
        unique_id: ev_price_delta_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set v = states('sensor.ev_virtual_day_price_real') | float(999) %}
          {% set r = states('sensor.ev_night_reference_price_real') | float(999) %}
          {% if v == 999 or r == 999 %}
            {{ 'unavailable' }}
          {% else %}
            {{ (v - r) | round(3) }}
          {% endif %}
          
      - name: "EV Charge Decision"
        unique_id: ev_charge_decision
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
          {% set delta = states('sensor.ev_price_delta_real') | float(999) %}
          {% set start_margin = states('input_number.ev_price_start_margin') | float(0.08) %}
          {% set stop_margin = states('input_number.ev_price_stop_margin') | float(0.12) %}
          {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
          {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
          {% set currently_charging = states('sensor.eh45khwp_power') | float(0) > 100 %}

          {% if not enabled %}
            VENT
          {% elif not cable %}
            VENT
          {% elif not session %}
            VENT
          {% elif complete %}
            VENT
          {% elif mode == 'Stop' %}
            VENT
          {% elif mode == 'Charge Now' %}
            LAD
          {% elif deadline %}
            LAD
          {% elif currently_charging %}
            {% if delta >= stop_margin %}
              VENT
            {% else %}
              LAD
            {% endif %}
          {% else %}
            {% if delta <= (0 - start_margin) %}
              LAD
            {% else %}
              VENT
            {% endif %}
          {% endif %}

        attributes:
          reason: >
            {% set mode = states('input_select.ev_charge_mode') %}
            {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
            {% set override = is_state('input_boolean.ev_manual_override', 'on') %}
            {% set session = is_state('input_boolean.ev_session_active', 'on') %}
            {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
            {% set delta = states('sensor.ev_price_delta_real') | float(999) %}
            {% set start_margin = states('input_number.ev_price_start_margin') | float(0.08) %}
            {% set stop_margin = states('input_number.ev_price_stop_margin') | float(0.12) %}
            {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
            {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
            {% set currently_charging = states('sensor.eh45khwp_power') | float(0) > 100 %}

            {% if not enabled %}
              HA off
            {% elif not cable %}
              No cable
            {% elif not session %}
              No session
            {% elif complete %}
              Complete
            {% elif mode == 'Stop' %}
              Stop
            {% elif override %}
              Manual override
            {% elif mode == 'Charge Now' %}
              Charge Now
            {% elif deadline %}
              Deadline
            {% elif currently_charging and delta >= stop_margin %}
              Stop margin reached
            {% elif currently_charging %}
              Continue charging
            {% elif delta <= (0 - start_margin) %}
              Cheap enough to start
            {% else %}
              Waiting cheaper
            {% endif %}

          mode: >
            {{ states('input_select.ev_charge_mode') }}

          enabled: >
            {{ is_state('input_boolean.ev_ha_control_enabled', 'on') }}

          manual_override: >
            {{ is_state('input_boolean.ev_manual_override', 'on') }}

          session_active: >
            {{ is_state('input_boolean.ev_session_active', 'on') }}

          cable_connected: >
            {{ is_state('binary_sensor.ev_cable_connected_effective', 'on') }}

          deadline_risk: >
            {{ is_state('binary_sensor.ev_deadline_risk', 'on') }}

          session_complete: >
            {{ is_state('binary_sensor.ev_session_complete', 'on') }}

          currently_charging: >
            {{ states('sensor.eh45khwp_power') | float(0) > 100 }}

          price_delta: >
            {{ states('sensor.ev_price_delta_real') | float(999) | round(3) }}

          start_margin: >
            {{ states('input_number.ev_price_start_margin') | float(0.08) | round(3) }}

          stop_margin: >
            {{ states('input_number.ev_price_stop_margin') | float(0.12) | round(3) }}

