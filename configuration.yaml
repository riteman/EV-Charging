      - name: "EV Operational Status"
        unique_id: ev_operational_status
        state: >
          {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set ready = is_state('binary_sensor.ev_ready_to_charge', 'on') %}
          {% set decision = states('sensor.ev_charge_decision') %}
          {% set remaining = states('sensor.ev_remaining_energy_live_kwh') %}
          {% set next_slot = states('sensor.ev_next_charge_window_real') %}
          {% set power_kw = states('sensor.eh45khwp_power') | float(0) %}
          {% set charging = power_kw > 0.5 %}
          {% set start_delay = is_state('input_boolean.ev_start_delay_active', 'on') %}
          {% set charger_on = is_state('switch.eh45khwp_charger_enabled', 'on') %}
          {% set raw = states('sensor.ev_target_ampere_raw') | int(0) %}
          {% set stable = states('sensor.ev_target_ampere_stable') | int(0) %}
