          {% set X = [states('sensor.grid_export_power_average_2m_safe') | float(0), 0] | max %}

          {# Hvis strøm allerede er billig nok → fuld ladning #}
          {% if Y <= Pthr %}
            16

          {# Ingen sol → ingen sol-optimering #}
          {% elif X <= 0 %}
            0

          {% else %}
            {% set denom = 1 - (Pthr / Y) %}

            {% if denom <= 0 %}
              16
            {% else %}
              {% set Amax = (16 * X) / (11 * denom) %}
              {% set A = Amax | int(0) %}

              {% if A < 6 %}
                0
              {% elif A > 16 %}
                16
              {% else %}
                {{ A }}
              {% endif %}
            {% endif %}
          {% endif %}

