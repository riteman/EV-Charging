            {% endif %}
          age_hours: >
            {% set ts = states('sensor.easee_api_access_token_final_2') %}
            {% if ts not in ['unknown', 'unavailable', '', 'none'] %}
              {{ ((as_timestamp(now()) - as_timestamp(ts)) / 3600) | round(2) }}
            {% else %}
              {{ none }}
            {% endif %}
          stale: >
            {% set ts = states('sensor.easee_api_access_token_final_2') %}
            {% if ts not in ['unknown', 'unavailable', '', 'none'] %}
              {{ ((as_timestamp(now()) - as_timestamp(ts)) / 3600) > 1.5 }}
            {% else %}
              false
            {% endif %}
          has_token: >
            {{ state_attr('sensor.easee_api_access_token_final_2', 'accessToken') not in [none, ''] }} 

      - name: "IntelliCharge Auth Status"
        unique_id: intellicharge_auth_status
        state: >
          {% set token = state_attr('sensor.intellicharge_api_auth', 'access_token') %}
          {% if token not in [none, ''] %}
            OK
          {% else %}
            Fejl
          {% endif %}
        icon: >
          {% if state_attr('sensor.intellicharge_api_auth', 'access_token') not in [none, ''] %}
            mdi:check-circle
          {% else %}
            mdi:alert-circle
          {% endif %}
        attributes:
          has_token: >
            {{ state_attr('sensor.intellicharge_api_auth', 'access_token') not in [none, ''] }}

          token_preview: >
            {% set t = state_attr('sensor.intellicharge_api_auth', 'access_token') %}
            {% if t not in [none, ''] %}
              {{ t[:10] ~ '...' }}
            {% else %}
              none
            {% endif %}  

      - name: "EV Charging Actual"
        unique_id: ev_charging_actual
        state: >
          {{ states('sensor.eh45khwp_power') | float(0) > 100 }}   

      - name: "EV IntelliCharge Decision Text"
        unique_id: ev_intellicharge_decision_text
        state: >
          {% if is_state('binary_sensor.ev_should_force_intellicharge_allow', 'on') %}
            Set Allow Always
          {% else %}
            Keep Smart
          {% endif %}           
      

        
 # -----------------------------------------------------------------------------

    - binary_sensor:
      - name: "EV Deadline Risk"
        unique_id: ev_deadline_risk
        state: >
          {% set needed = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set available = states('sensor.ev_hours_until_ready') | float(0) %}
          {{ needed > available and needed > 0 }}

      - name: "EV Session Complete"
        unique_id: ev_session_complete
        state: >
          {{ states('sensor.ev_remaining_energy_kwh') | float(0) <= 0.5 }}
          
      - name: "EV Cable Connected Effective"
        unique_id: ev_cable_connected_effective
        state: >
          {{
            is_state('binary_sensor.charging_cable_connected', 'on')
            or is_state('input_boolean.ev_simulation_mode', 'on')
          }}
          
      - name: "EV Export Price Positive"
        unique_id: ev_export_price_positive
        state: >
          {{ states('sensor.nordpool_kwh_dk1_dkk_3_10_025') | float(0) >= 0 }}
          
      - name: "IntelliCharge Token Stale"
        unique_id: intellicharge_token_stale
        state: >
          {% set age = states('sensor.intellicharge_token_age_hours') | float(0) %}
          {{ age > 20 }} 

      - name: "EV Should Force IntelliCharge Allow"
        unique_id: ev_should_force_intellicharge_allow
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set ha = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
          {% set gate = is_state('binary_sensor.ev_sun_optimized_export_gate', 'on') %}
          {% set charging = states('sensor.eh45khwp_power') | float(0) > 0.5 %}
          {% set decision = states('sensor.ev_charge_decision') %}

          {{
            ha
            and session
            and cable
            and mode != 'Stop'
            and (
              gate
              or charging
              or decision == 'LAD'
            )
          }}

        attributes:
          mode: "{{ states('input_select.ev_charge_mode') }}"
          ha_control: "{{ states('input_boolean.ev_ha_control_enabled') }}"
          session_active: "{{ states('input_boolean.ev_session_active') }}"
          cable_connected: "{{ states('binary_sensor.ev_cable_connected_effective') }}"
          gate: "{{ states('binary_sensor.ev_sun_optimized_export_gate') }}"
          latched_export_kw: "{{ states('input_number.ev_sun_optimized_latched_export_kw') }}"
          current_export_kw: "{{ states('sensor.grid_export_power_average_2m_safe') }}"
          charging: "{{ states('sensor.eh45khwp_power') | float(0) > 0.5 }}"
          decision: "{{ states('sensor.ev_charge_decision') }}"
          reason: >
            {% set mode = states('input_select.ev_charge_mode') %}
            {% set ha = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
            {% set session = is_state('input_boolean.ev_session_active', 'on') %}
            {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
            {% set gate = is_state('binary_sensor.ev_sun_optimized_export_gate', 'on') %}
            {% set charging = states('sensor.eh45khwp_power') | float(0) > 0.5 %}
            {% set decision = states('sensor.ev_charge_decision') %}

            {% if not ha %}
              HA control off
            {% elif not session %}
              No active EV session
            {% elif not cable %}
              Cable not connected
            {% elif mode == 'Stop' %}
              Stop mode
            {% elif charging %}
              Already charging, keep inverter available
            {% elif decision == 'LAD' %}
              EV decision is LAD, keep inverter available
            {% elif gate %}
              Latched export can support at least 6A
            {% else %}
              No reason to force inverter open
            {% endif %}

      - name: "EV Ampere Update Allowed"
        unique_id: ev_ampere_update_allowed
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set cable = is_state('binary_sensor.charging_cable_connected', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set ha = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set target = states('sensor.ev_target_ampere_effective') | int(0) %}

          {{
            ha
            and session
            and cable
            and mode in ['Auto', 'Charge Now', 'Monta Guest']
            and target > 0
          }}  
          
      - name: "EV Ready To Charge"
        unique_id: ev_ready_to_charge
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set ha = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.charging_cable_connected', 'on') %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}
          {% set ready_ok = ready not in ['unknown', 'unavailable', '', 'none']
            and as_timestamp(ready) > as_timestamp(now()) %}
          {% set remaining = states('sensor.ev_remaining_energy_live_kwh') %}
          {% set remaining_ok = (remaining not in ['unknown', 'unavailable', '', 'none'])
            and (remaining | float(0) > 0) %}
          {{
            mode != 'Stop'
            and ha
            and session
            and cable
            and ready_ok
            and remaining_ok
          }}
      - name: "EV Sun Optimized Export Gate"
        unique_id: ev_sun_optimized_export_gate
        state: >
          {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
          {% set threshold = 11 / 16 * min_amp %}
          {{ states('input_number.ev_sun_optimized_latched_export_kw') | float(0) >= threshold }}

        attributes:
          latched_export_kw: >
            {{ states('input_number.ev_sun_optimized_latched_export_kw') | float(0) | round(2) }}

          min_ampere: >
            {{ states('input_number.ev_min_charge_ampere') | int(7) }}

          threshold_kw: >
            {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
            {{ (11 / 16 * min_amp) | round(2) }}

          reason: >
            {% set min_amp = states('input_number.ev_min_charge_ampere') | int(7) %}
            {% set threshold = 11 / 16 * min_amp %}
            {% set export = states('input_number.ev_sun_optimized_latched_export_kw') | float(0) %}
            {% if export >= threshold %}
              Last known export can support minimum {{ min_amp }}A
            {% else %}
              Last known export cannot support minimum {{ min_amp }}A
            {% endif %}

      
# 2. Kommandoen der styrer ampere 
rest_command:
  set_ioniq_ampere:
    url: "https://api.easee.cloud/api/chargers/EH45KHWP/settings"
    method: post
    headers:
      authorization: "Bearer {{ state_attr('sensor.easee_api_access_token_final_2', 'accessToken') }}"
      content-type: "application/json"
    payload: '{"dynamicChargerCurrent": {{ ampere | int }}}'

  intellicharge_set_smart:
    url: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: PUT
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      content-type: "application/json"
    payload: >
      {"smart_0_export": 1, "allow_export_to_grid": false, "enable_buy_from_grid": true, "enable_sell_to_grid": true, "enable_idle": true, "enable_locked": true}


  intellicharge_set_allow_always:
    url: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: PUT
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      content-type: "application/json"
    payload: >
      {"smart_0_export": 0, "allow_export_to_grid": false, "enable_buy_from_grid": true, "enable_sell_to_grid": true, "enable_idle": true, "enable_locked": true}    

  easee_start_charging:
    url: "https://api.easee.com/api/chargers/EH45KHWP/commands/start_charging"
    method: post
    headers:
      authorization: "Bearer {{ state_attr('sensor.easee_api_access_token_final_2', 'accessToken') }}"
      content-type: "application/json"

  easee_stop_charging:
    url: "https://api.easee.com/api/chargers/EH45KHWP/commands/stop_charging"
    method: post
    headers:
      authorization: "Bearer {{ state_attr('sensor.easee_api_access_token_final_2', 'accessToken') }}"
      content-type: "application/json" 


rest:
  - resource: "https://api.easee.cloud/api/accounts/login"
    method: POST
    payload: !secret easee_payload
    headers:
      Content-Type: "application/json"
    scan_interval: 7200

    sensor:
      - name: "Easee API Access Token Final"
        unique_id: easee_api_token_manual_final
        value_template: >
          {% if value_json is defined and value_json.accessToken is defined %}
            {{ now().isoformat() }}
          {% else %}
            {{ none }}
          {% endif %}
        json_attributes:
          - accessToken

  # 🔐 IntelliCharge AUTH
  - resource: "https://api.intellicharge.ai/api/v1/login/access-token"
    method: POST
    payload: !secret intellicharge_login_payload
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Accept: "application/json, text/plain, */*"
    scan_interval: 43200

    sensor:
      - name: "IntelliCharge API Auth"
        unique_id: intellicharge_api_auth
        value_template: >
          {% if value_json is defined and value_json.access_token is defined %}
            {{ now().isoformat() }}
          {% else %}
            {{ none }}
          {% endif %}
        json_attributes:
          - access_token
          - refresh_token
          - token_type


  # ⚡ IntelliCharge PLANT STATUS
  - resource_template: "https://api.intellicharge.ai/api/v1/plant/3352"
    method: GET
    headers:
      authorization: "Bearer {{ state_attr('sensor.intellicharge_api_auth', 'access_token') }}"
      Accept: "application/json"
    scan_interval: 21600

    sensor:
      - name: "EV IntelliCharge Smart Status"
        unique_id: ev_intellicharge_smart_status

        value_template: >
          {% if value_json is defined and value_json.smart_0_export is defined %}
            {% if value_json.smart_0_export == 1 %}
              Smart
            {% elif value_json.smart_0_export == 0 %}
              Allow Always
            {% else %}
              Ukendt
            {% endif %}
          {% else %}
            Ukendt
          {% endif %}

        icon: >
          {% if value_json is defined and value_json.smart_0_export is defined %}
            {% if value_json.smart_0_export == 1 %}
              mdi:brain
            {% else %}
              mdi:flash
            {% endif %}
          {% else %}
            mdi:help-circle-outline
          {% endif %}

        json_attributes:
          - smart_0_export
          - allow_export_to_grid
          - enable_buy_from_grid
          - enable_sell_to_grid
          - enable_idle
          - enable_locked

shell_command:
  ev_append_segment_csv: >-
    bash -c 'mkdir -p /config/ev_logs;
    if [ ! -f /config/ev_logs/ev_segments.csv ]; then
      echo "type,start,end,mode,ampere,kwh,session_energy,start_soc,target_soc,battery_kwh" > /config/ev_logs/ev_segments.csv;
    fi;
    echo "{{ line }}" >> /config/ev_logs/ev_segments.csv'

  ev_append_session_csv: >-
    bash -c 'mkdir -p /config/ev_logs;
    if [ ! -f /config/ev_logs/ev_sessions.csv ]; then
      echo "type,start,end,mode,total_kwh,max_ampere,start_soc,target_soc,battery_kwh" > /config/ev_logs/ev_sessions.csv;
    fi;
    echo "{{ line }}" >> /config/ev_logs/ev_sessions.csv'          
  
      
  

          
