      - name: "EV Charge Windows Real"
        unique_id: ev_charge_windows_real
        state: >
          {% set prices = (state_attr('sensor.stromligning_current_price_vat', 'prices') or [])
            + (state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or []) %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if need <= 0 or ready in ['unknown', 'unavailable', ''] %}
            -
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set ns = namespace(candidates=[], remaining=need, selected=[], merged=[], out=[]) %}

            {# Byg kandidater med reel overlap mod nu/deadline #}
            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% set end_ts = start_ts + 3600 %}
              {% set overlap_start = [start_ts, now_ts] | max %}
              {% set overlap_end = [end_ts, ready_ts] | min %}
              {% set overlap = (overlap_end - overlap_start) / 3600 %}

              {% if overlap > 0 %}
                {% set ns.candidates = ns.candidates + [(item.price | float(999), overlap_start, overlap)] %}
              {% endif %}
            {% endfor %}

            {# Vælg billigste slots først #}
            {% set sorted_candidates = ns.candidates | sort %}

            {% for price, start_ts, avail in sorted_candidates %}
              {% if ns.remaining > 0 %}
                {% set used = [avail, ns.remaining] | min %}
                {% set end_ts = start_ts + (used * 3600) %}
                {% set ns.remaining = ns.remaining - used %}
                {% set ns.selected = ns.selected + [(start_ts, end_ts)] %}
              {% endif %}
            {% endfor %}

            {# Sortér valgte slots kronologisk #}
            {% set selected_sorted = ns.selected | sort %}

            {# Merge sammenhængende vinduer #}
            {% for start_ts, end_ts in selected_sorted %}
              {% if ns.merged | count == 0 %}
                {% set ns.merged = [(start_ts, end_ts)] %}
              {% else %}
                {% set last = ns.merged[-1] %}
                {% set last_start = last[0] %}
                {% set last_end = last[1] %}

                {% if start_ts <= (last_end + 60) %}
                  {% set ns.merged = ns.merged[:-1] + [(last_start, [last_end, end_ts] | max)] %}
                {% else %}
                  {% set ns.merged = ns.merged + [(start_ts, end_ts)] %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {# Formatér til tekst #}
            {% for start_ts, end_ts in ns.merged %}
              {% set start_txt = start_ts | timestamp_custom('%H:%M') %}
              {% set end_txt = end_ts | timestamp_custom('%H:%M') %}
              {% set ns.out = ns.out + [start_txt ~ '-' ~ end_txt] %}
            {% endfor %}

            {{ ns.out | join(', ') if ns.out | count > 0 else '-' }}
          {% endif %}
          
