# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_select:
  ev_charge_mode:
    name: EV Charge Mode
    options:
      - Auto
      - Stop
      - Charge Now
      - Monta Guest
    initial: Auto

  ev_guest_target_quick:
    name: Guest Target Quick
    options:
      - "80"
      - "100"
    initial: "80"

input_boolean:
  ev_ha_control_enabled:
    name: EV HA Control Enabled
    
  ev_guest_target_100:
    name: Lad til 100%

  ev_manual_override:
    name: EV Manual Override

  ev_session_active:
    name: EV Session Active
    
  ev_simulation_mode:
    name: EV Simulation Mode    

input_datetime:
  ev_planned_ready_by:
    name: EV Planned Ready By
    has_date: true
    has_time: true

  ev_session_ready_by:
    name: EV Session Ready By
    has_date: true
    has_time: true

input_number:
  ev_guest_planned_start_soc:
    name: Guest Planned Start SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 0
    mode: box

  ev_guest_planned_target_soc:
    name: Guest Planned Target SOC
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
    mode: box

  ev_guest_planned_battery_kwh:
    name: Guest Planned Battery kWh
    min: 10
    max: 120
    step: 0.5
    unit_of_measurement: "kWh"
    initial: 77
    mode: box

  ev_session_start_soc:
    name: EV Session Start SOC
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 0
    mode: box

  ev_session_target_soc:
    name: EV Session Target SOC
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 80
    mode: box

  ev_session_battery_kwh:
    name: EV Session Battery kWh
    min: 10
    max: 120
    step: 0.5
    unit_of_measurement: "kWh"
    initial: 77
    mode: box

  ev_charge_power_kw:
    name: EV Charge Power kW
    min: 1
    max: 22
    step: 0.1
    unit_of_measurement: "kW"
    initial: 11
    mode: box

  ev_price_start_margin:
    name: EV Start Margin
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "DKK/kWh"
    initial: 0.08
    mode: box

  ev_price_stop_margin:
    name: EV Stop Margin
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "DKK/kWh"
    initial: 0.12
    mode: box

sensor:
  - platform: rest
    name: "Shelly Grid Power"
    resource: http://192.168.10.250/status
    value_template: >
      {{
        (value_json.emeters[0].power | float(0)) +
        (value_json.emeters[1].power | float(0)) +
        (value_json.emeters[2].power | float(0))
      }}
    unit_of_measurement: "W"
    scan_interval: 10

sensor:
  - platform: statistics
    name: Grid Export Power Average 2m
    entity_id: sensor.grid_export_power
    state_characteristic: mean
    max_age:
      minutes: 2

template:
  - sensor:
      - name: "EV Virtual Day Price"
        unique_id: ev_virtual_day_price
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set charger_power = states('input_number.ev_charge_power_kw') | float(11) %}
          {% set grid_w = states('sensor.shelly_grid_power') | float(0) %}
          {% set grid_kw = grid_w / 1000 %}
          {% set price = states('sensor.nordpool_kwh_dk1_dkk_3_10_025') | float(0) %}

          {% set export_kw = (0 - grid_kw) if grid_kw < 0 else 0 %}
          {% set free_kw = [export_kw, charger_power] | min %}
          {% set net_kw = charger_power - free_kw %}

          {% if charger_power > 0 %}
            {{ (price * (net_kw / charger_power)) | round(3) }}
          {% else %}
            0
          {% endif %}

      - name: "EV Remaining Energy kWh"
        unique_id: ev_remaining_energy_kwh
        unit_of_measurement: "kWh"
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}

          {% if mode == 'Monta Auto' %}
            {% set start_soc = states('input_number.ev_session_start_soc') | float(0) %}
            {% set target_soc = states('input_number.ev_session_target_soc') | float(80) %}
            {% set batt = states('input_number.ev_session_battery_kwh') | float(77) %}
            {% set delta_soc = [target_soc - start_soc, 0] | max %}
            {{ (batt * delta_soc / 100) | round(1) }}
          {% else %}
            {% set current_soc = states('sensor.battery_level') | float(0) %}
            {% set target_soc = states('input_number.ev_session_target_soc') | float(80) %}
            {% set batt = states('input_number.ev_session_battery_kwh') | float(77) %}
            {% set delta_soc = [target_soc - current_soc, 0] | max %}
            {{ (batt * delta_soc / 100) | round(1) }}
          {% endif %}

      - name: "EV Remaining Hours Needed"
        unique_id: ev_remaining_hours_needed
        unit_of_measurement: "h"
        state: >
          {% set remaining = states('sensor.ev_remaining_energy_kwh') | float(0) %}
          {% set power = states('input_number.ev_charge_power_kw') | float(11) %}
          {% set efficiency = 0.92 %}
          {% if power > 0 %}
            {{ (remaining / (power * efficiency)) | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "EV Hours Until Ready"
        unique_id: ev_hours_until_ready
        unit_of_measurement: "h"
        state: >
          {% set ready = states('input_datetime.ev_session_ready_by') %}
          {% if ready in ['unknown', 'unavailable', '', 'none'] %}
            0
          {% else %}
            {% set delta = (as_timestamp(ready) - as_timestamp(now())) / 3600 %}
            {{ [delta, 0] | max | round(2) }}
          {% endif %}

      - name: "EV Night Reference Price"
        unique_id: ev_night_reference_price
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set np = 'sensor.nordpool_dk1_hourly_prices' %}
          {% set today = state_attr(np, 'today_hourly') or [] %}
          {% set tomorrow = state_attr(np, 'tomorrow_hourly') or [] %}
          {% set prices = today + tomorrow %}
          {% set hours_needed = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set need = hours_needed | round(0, 'ceil') | int(0) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if ready in ['unknown', 'unavailable', '', 'none'] %}
            {{ states(np) | float(0) }}
          {% elif need <= 0 %}
            0
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set horizon = ((ready_ts - now_ts) / 3600) | round(0, 'floor') | int(0) %}
            {% set current_hour = now().hour %}
            {% set ns = namespace(candidates=[]) %}

            {% if horizon <= 0 %}
              {{ states(np) | float(0) }}
            {% else %}
              {% for i in range(horizon) %}
                {% set idx = current_hour + i %}
                {% if idx < (prices | count) %}
                  {% set ns.candidates = ns.candidates + [prices[idx] | float(999)] %}
                {% endif %}
              {% endfor %}

              {% set sorted_prices = ns.candidates | sort %}
              {% set cheapest = sorted_prices[:need] %}

              {% if cheapest | count > 0 %}
                {{ (cheapest | sum / (cheapest | count)) | round(3) }}
              {% else %}
                {{ states(np) | float(0) }}
              {% endif %}
            {% endif %}
          {% endif %}

      - name: "EV Price Delta"
        unique_id: ev_price_delta
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set v = states('sensor.ev_virtual_day_price') | float(999) %}
          {% set r = states('sensor.ev_night_reference_price') | float(999) %}
          {{ (v - r) | round(3) }}

      - name: "EV Charge Decision"
        unique_id: ev_charge_decision
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set override = is_state('input_boolean.ev_manual_override', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
          {% set delta = states('sensor.ev_price_delta_real') | float(999) %}                
          {% set start_margin = states('input_number.ev_price_start_margin') | float(0.08) %}
          {% set stop_margin = states('input_number.ev_price_stop_margin') | float(0.12) %}
          {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
          {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
          {% set currently_charging = states('sensor.eh45khwp_power') | float(0) > 100 %}

          {% if not enabled %}
            VENT
          {% elif not cable %}
            VENT
          {% elif not session %}
            VENT
          {% elif complete %}
            VENT
          {% elif mode == 'Stop' %}
            VENT
          {% elif override %}
            LAD
          {% elif mode == 'Charge Now' %}
            LAD
          {% elif deadline %}
            LAD
          {% elif currently_charging %}
            {% if delta >= stop_margin %}
              VENT
            {% else %}
              LAD
            {% endif %}
          {% else %}
            {% if delta <= (0 - start_margin) %}
              LAD
            {% else %}
              VENT
            {% endif %}
          {% endif %}

      - name: "EV Charge Reason"
        unique_id: ev_charge_reason
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set override = is_state('input_boolean.ev_manual_override', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
          {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
          {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
          {% set delta = states('sensor.ev_price_delta') | float(999) %}
          {% set currently_charging = states('sensor.eh45khwp_power') | float(0) > 100 %}
          {% set v = states('sensor.ev_virtual_day_price') | float(999) %}
          {% set r = states('sensor.ev_night_reference_price') | float(999) %}

          {% if not enabled %}
            HA-kontrol er slået fra
          {% elif not cable %}
            Kabel ikke tilsluttet
          {% elif not session %}
            Ingen aktiv ladesession
          {% elif complete %}
            Mål nået
          {% elif override %}
            Manuel override
          {% elif mode == 'Charge Now' %}
            Charge Now
          {% elif mode == 'Stop' %}
            Stop mode aktiv    
          {% elif deadline %}
            Deadline risiko
          {% elif currently_charging %}
            Fortsætter: hysterese aktiv (dagpris {{ v }}, natref {{ r }})
          {% elif delta <= 0 %}
            Starter: pris nu bedre end nødvendige timer senere
          {% else %}
            Venter: billigere timer forventes senere
          {% endif %}

      - name: "EV Charge Power Mode"
        unique_id: ev_charge_power_mode
        state: >
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}
          {% set session = is_state('input_boolean.ev_session_active', 'on') %}
          {% set cable = is_state('binary_sensor.ev_cable_connected_effective', 'on') %}
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set deadline = is_state('binary_sensor.ev_deadline_risk', 'on') %}
          {% set complete = is_state('binary_sensor.ev_session_complete', 'on') %}
          {% set delta = states('sensor.ev_price_delta_real') | float(999) %}       
          {% if not enabled or not cable or not session or complete %}
            STOP
          {% elif mode == 'Charge Now' %}
            FULL
          {% elif deadline %}
            FULL
          {% elif delta <= -0.10 %}
            FULL
          {% elif delta <= 0.05 %}
            REDUCED
          {% elif mode == 'Stop' %}
            STOP
          {% else %}
            STOP
          {% endif %}
          
      - name: "Grid Export Power"
        unique_id: grid_export_power
        unit_of_measurement: "kW"
        state: >
          {% set grid = states('sensor.shelly_grid_power') | float(0) / 1000 %}
          {% if grid < 0 %}
            {{ (0 - grid) | round(2) }}
          {% else %}
            0
          {% endif %}
          
      - name: "Electricity Price Now"
        unique_id: electricity_price_now
        unit_of_measurement: "DKK/kWh"
        state: >
          {{ states('sensor.nordpool_dk1_hourly_prices') | float(0) }}
          
      - name: "EV Price Window Raw"
        unique_id: ev_price_window_raw
        state: >
          {% set np = 'sensor.nordpool_kwh_dk1_dkk_3_10_025' %}
          {% set today = state_attr(np, 'today') or [] %}
          {% set tomorrow = state_attr(np, 'tomorrow') or [] %}
          {{ (today + tomorrow) | join(', ') }}
          
      - name: "EV Cheapest Hours"
        unique_id: ev_cheapest_hours
        state: >
          {% set np = 'sensor.nordpool_kwh_dk1_dkk_3_10_025' %}
          {% set today = state_attr(np, 'today') or [] %}
          {% set tomorrow = state_attr(np, 'tomorrow') or [] %}
          {% set prices = today + tomorrow %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') | int(0) %}
          {% set sorted = prices | sort %}
          {{ sorted[:need] | join(', ') }}
          
      - name: "EV Night Hours Used"
        unique_id: ev_night_hours_used
        unit_of_measurement: "h"
        state: >
          {{ states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') }}

      - name: "EV Cheapest Hour Price"
        unique_id: ev_cheapest_hour_price
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set np = 'sensor.nordpool_kwh_dk1_dkk_3_10_025' %}
          {% set today = state_attr(np, 'today') or [] %}
          {% set tomorrow = state_attr(np, 'tomorrow') or [] %}
          {% set prices = today + tomorrow %}
          {{ prices | min }}

      - name: "EV Cheapest Hours Clock"
        unique_id: ev_cheapest_hours_clock
        state: >
          {% set np = 'sensor.nordpool_dk1_hourly_prices' %}
          {% set today = state_attr(np, 'today_hourly') or [] %}
          {% set tomorrow = state_attr(np, 'tomorrow_hourly') or [] %}
          {% set prices = today + tomorrow %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') | int(0) %}
          {% set now_hour = now().hour %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if ready in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set horizon = ((ready_ts - now_ts) / 3600) | int(0) %}
            {% set ns = namespace(candidates=[], hours=[]) %}

            {% for i in range(horizon) %}
              {% set idx = now_hour + i %}
              {% if idx < (prices | count) %}
                {% set hour = idx % 24 %}
                {% set price = prices[idx] | float(999) %}
                {% set ns.candidates = ns.candidates + [(price, hour)] %}
              {% endif %}
            {% endfor %}

            {% set sorted = ns.candidates | sort %}
            {% set chosen = sorted[:need] %}

            {% for item in chosen %}
              {% set ns.hours = ns.hours + ["%02d:00" % item[1]] %}
            {% endfor %}

            {{ ns.hours | join(', ') }}
          {% endif %}
          
      - name: "EV Plan Preview"
        unique_id: ev_plan_preview
        state: >
          {% set np = 'sensor.nordpool_dk1_hourly_prices' %}
          {% set today = state_attr(np, 'today_hourly') or [] %}
          {% set tomorrow = state_attr(np, 'tomorrow_hourly') or [] %}
          {% set prices = today + tomorrow %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') | int(0) %}
          {% set now_hour = now().hour %}
          {% set ready = states('input_datetime.ev_planned_ready_by') %}

          {% if need == 0 %}
           🔋 Klar
          {% elif ready in ['unknown', 'unavailable', ''] %}
            ⏱ Ingen deadline
          {% else %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set horizon = ((ready_ts - now_ts) / 3600) | int(0) %}
            {% set ns = namespace(candidates=[], hours=[]) %}

            {% for i in range(horizon) %}
              {% set idx = now_hour + i %}
              {% if idx < (prices | count) %}
                {% set hour = idx % 24 %}
                {% set price = prices[idx] | float(999) %}
                {% set ns.candidates = ns.candidates + [(price, hour)] %}
              {% endif %}
            {% endfor %}

            {% set sorted = ns.candidates | sort %}
            {% set chosen = sorted[:need] %}

            {% for item in chosen %}
              {% set ns.hours = ns.hours + ["%02d:00" % item[1]] %}
            {% endfor %}

            {{ ns.hours | join(', ') }}
          {% endif %}
          
      - name: "EV Remaining Minutes Needed"
        unique_id: ev_remaining_minutes_needed
        unit_of_measurement: "min"
        state: >
          {{ (states('sensor.ev_remaining_hours_needed') | float(0) * 60) | round(0) }}
          
      - name: "EV Plan Preview Detailed"
        unique_id: ev_plan_preview_detailed
        state: >
          {% set hours = states('sensor.ev_plan_preview') %}
          {% set minutes = states('sensor.ev_remaining_minutes_needed') | int(0) %}
          {% if hours in ['unknown', 'unavailable', '', '-'] %}
            -
          {% else %}
            {{ hours }} (ca. {{ minutes }} min)
          {% endif %}
          
      - name: "EV Kabel UI"
        unique_id: ev_kabel_ui
        state: >
          {% if is_state('binary_sensor.ev_cable_connected_effective','on') %}
            🔌 Tilsluttet
          {% else %}
            ❌ Ikke tilsluttet
          {% endif %}
          
      - name: "Nordpool DK1 Hourly Prices"
        unique_id: nordpool_dk1_hourly_prices
        state: >
          {% set raw = state_attr('sensor.nordpool_kwh_dk1_dkk_3_10_025', 'today') or [] %}
          {% if raw | count >= 4 %}
            {{ raw[0:4] | sum / 4 }}
          {% else %}
            {{ states('sensor.nordpool_kwh_dk1_dkk_3_10_025') | float(0) }}
          {% endif %}
        attributes:
          today_hourly: >
            {% set raw = state_attr('sensor.nordpool_kwh_dk1_dkk_3_10_025', 'today') or [] %}
            {% set ns = namespace(out=[]) %}
            {% if raw | count >= 4 %}
              {% for i in range(0, raw | count, 4) %}
                {% set chunk = raw[i:i+4] %}
                {% if chunk | count == 4 %}
                  {% set ns.out = ns.out + [((chunk | sum) / 4) | round(3)] %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ ns.out }}
          tomorrow_hourly: >
            {% set raw = state_attr('sensor.nordpool_kwh_dk1_dkk_3_10_025', 'tomorrow') or [] %}
            {% set ns = namespace(out=[]) %}
            {% if raw | count >= 4 %}
              {% for i in range(0, raw | count, 4) %}
                {% set chunk = raw[i:i+4] %}
                {% if chunk | count == 4 %}
                  {% set ns.out = ns.out + [((chunk | sum) / 4) | round(3)] %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ ns.out }}
        unit_of_measurement: "DKK/kWh"
        
  
      - name: "EV Next Start Time"
        unique_id: ev_next_start_time
        state: >
          {% set decision = states('sensor.ev_charge_decision') %}
          {% set plan = states('sensor.ev_cheapest_hours_clock') %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) %}

          {% if need <= 0 %}
            Klar
          {% elif decision == 'LAD' %}
            Lader nu
          {% elif plan in ['unknown', 'unavailable', '', '-', 'Ingen plan'] %}
            Ingen plan
          {% else %}
            {% set first = plan.split(',')[0].strip() %}
            Starter kl {{ first }}
          {% endif %}
          
      - name: "EV Status Card Text"
        unique_id: ev_status_card_text
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set decision = states('sensor.ev_charge_decision') %}
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}

          {% if mode == 'Stop' %}
            ⛔ STOP
          {% elif not enabled %}
            ⚪ VENTER
          {% elif decision == 'LAD' %}
            🟢 LADER
          {% else %}
            ⚪ VENTER
          {% endif %}
          
      - name: "EV Mode"
        state: >
          {% if is_state('input_boolean.ev_simulation_mode', 'on') %}
            🧪 Simulation
          {% else %}
            🚗 Real
          {% endif %}     

      - name: "EV Status Card Detail"
        unique_id: ev_status_card_detail
        state: >
          {% set mode = states('input_select.ev_charge_mode') %}
          {% set decision = states('sensor.ev_charge_decision') %}
          {% set reason = states('sensor.ev_charge_reason') %}
          {% set enabled = is_state('input_boolean.ev_ha_control_enabled', 'on') %}

          {% if mode == 'Stop' %}
            Automatisk opladning er stoppet
          {% elif not enabled %}
            HA-styring er slået fra
          {% elif decision == 'LAD' %}
            {{ reason }}
          {% else %}
            {{ reason }}
          {% endif %}
          
    # Hardcoded - to be modified to use Input Helpers
      - name: "EV Real Electricity Price"
        unique_id: ev_real_electricity_price
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set spot = states('sensor.nordpool_kwh_dk1_dkk_3_10_025') | float(0) %}
          {% set transport = 0.3075 %}
          {% set system = 0.115 %}
          {% set elafgift = 0.008 %}
          {% set total = spot + transport + system + elafgift %}
          {{ (total * 1.25) | round(3) }}

      - name: "Grid Power Display"
        unique_id: grid_power_display
        state: >
          {% set w = states('sensor.shelly_grid_power') | float(0) %}
          {% if w | abs < 10 %}
            0 W
          {% elif w | abs >= 1000 %}
            {{ (w / 1000) | round(2) }} kW
          {% else %}
            {{ w | round(0) }} W
          {% endif %}

      - name: "Solar Power Display"
        unique_id: solar_power_display
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.fsp_ne_191558692_flow_solar_power') | float(0) | round(2) }}

      - name: "Battery Power Display"
        unique_id: battery_power_display
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.fsp_ne_191558692_flow_battery_power') | float(0) | round(2) }}

      - name: "Load Power Display"
        unique_id: load_power_display
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.fsp_ne_191558692_flow_load_power') | float(0) | round(2) }}

      - name: "EV Power Display"
        unique_id: ev_power_display
        unit_of_measurement: "kW"
        state: >
          {{ (states('sensor.eh45khwp_power') | float(0) / 1000) | round(2) }}

      - name: "Electricity Price Display"
        unique_id: electricity_price_display
        unit_of_measurement: "DKK/kWh"
        state: >
          {{ states('sensor.electricity_price_now') | float(0) | round(3) }}

      - name: "EV Virtual Day Price Display"
        unique_id: ev_virtual_day_price_display
        unit_of_measurement: "DKK/kWh"
        state: >
          {{ states('sensor.ev_virtual_day_price') | float(0) | round(3) }}

      - name: "EV Night Reference Price Display"
        unique_id: ev_night_reference_price_display
        unit_of_measurement: "DKK/kWh"
        state: >
          {{ states('sensor.ev_night_reference_price') | float(0) | round(3) }}

      - name: "EV Price Delta Display"
        unique_id: ev_price_delta_display
        unit_of_measurement: "DKK/kWh"
        state: >
          {{ states('sensor.ev_price_delta') | float(0) | round(3) }}

      - name: "EV Remaining Energy Display"
        unique_id: ev_remaining_energy_display
        unit_of_measurement: "kWh"
        state: >
          {{ states('sensor.ev_remaining_energy_kwh') | float(0) | round(1) }}

      - name: "EV Remaining Hours Display"
        unique_id: ev_remaining_hours_display
        unit_of_measurement: "h"
        state: >
          {{ states('sensor.ev_remaining_hours_needed') | float(0) | round(2) }}
          
      - name: "Solar Power Display X"
        unique_id: solar_power_display_x
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.fsp_ne_191558692_flow_solar_power') | float(0) | round(2) }}
          
# Herunder følger sensorer fra den nye integration fra Stømligning som indeholder alle afgifter og skatter for vores hus

      - name: "Electricity Price Now Real"
        unique_id: electricity_price_now_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}

      - name: "EV Price Window Raw Real"
        unique_id: ev_price_window_raw_real
        state: >
          {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
          {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
          {% set prices = today + tomorrow %}
          {{ prices | count }}
        attributes:
          window: >
            {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
            {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
            {% set prices = today + tomorrow %}
            {% set ns = namespace(out=[]) %}

            {% for item in prices %}
              {% set start_txt = item.start | string %}
              {% set price_txt = (item.price | float(0) | round(3)) | string %}
              {% set ns.out = ns.out + [start_txt ~ '=' ~ price_txt] %}
            {% endfor %}

            {{ ns.out }}

      - name: "EV Virtual Day Price Real"
        unique_id: ev_virtual_day_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set charger_power = states('input_number.ev_charge_power_kw') | float(11) %}
          {% set export_kw = states('sensor.grid_export_power_average_2m_safe') | float(0) %}
          {% set price = states('sensor.stromligning_current_price_vat') | float(0) %}

          {% set free_kw = [export_kw, charger_power] | min %}
          {% set net_kw = charger_power - free_kw %}

          {% if charger_power > 0 %}
            {{ (price * (net_kw / charger_power)) | round(3) }}
          {% else %}
            0
          {% endif %}

      - name: "EV Night Reference Price Real"
        unique_id: ev_night_reference_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
          {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
          {% set prices = today + tomorrow %}
          {% set hours_needed = states('sensor.ev_remaining_hours_needed') | float(0) %}
          {% set need = hours_needed | round(0, 'ceil') | int(0) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if ready in ['unknown', 'unavailable', '', 'none'] %}
            {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
          {% elif need <= 0 %}
            0
          {% else %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set now_hour_ts = as_timestamp(now().replace(minute=0, second=0, microsecond=0)) %}
            {% set ns = namespace(candidates=[]) %}

            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% if start_ts is not none and start_ts >= now_hour_ts and start_ts < ready_ts %}
                {% set ns.candidates = ns.candidates + [item.price | float(999)] %}
              {% endif %}
            {% endfor %}

            {% set sorted_prices = ns.candidates | sort %}
            {% set cheapest = sorted_prices[:need] %}

            {% if cheapest | count > 0 %}
              {{ (cheapest | sum / (cheapest | count)) | round(3) }}
            {% else %}
              {{ states('sensor.stromligning_current_price_vat') | float(0) | round(3) }}
            {% endif %}
          {% endif %}

      - name: "EV Price Delta Real"
        unique_id: ev_price_delta_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set v = states('sensor.ev_virtual_day_price_real') | float(999) %}
          {% set r = states('sensor.ev_night_reference_price_real') | float(999) %}
          {{ (v - r) | round(3) }}

      - name: "EV Cheapest Hours Real"
        unique_id: ev_cheapest_hours_real
        state: >
          {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
          {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
          {% set prices = today + tomorrow %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') | int(0) %}
          {% set ns = namespace(vals=[]) %}
          {% for item in prices %}
            {% set ns.vals = ns.vals + [item.price | float(999)] %}
          {% endfor %}
          {% set sorted = ns.vals | sort %}
          {{ sorted[:need] | join(', ') }}

      - name: "EV Cheapest Hour Price Real"
        unique_id: ev_cheapest_hour_price_real
        unit_of_measurement: "DKK/kWh"
        state: >
          {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
          {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
          {% set prices = today + tomorrow %}
          {% set ns = namespace(vals=[]) %}
          {% for item in prices %}
            {% set ns.vals = ns.vals + [item.price | float(999)] %}
          {% endfor %}
          {% if ns.vals | count > 0 %}
            {{ (ns.vals | min) | round(3) }}
          {% else %}
            0
          {% endif %}

      - name: "EV Cheapest Hours Clock Real"
        unique_id: ev_cheapest_hours_clock_real
        state: >
          {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
          {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
          {% set prices = today + tomorrow %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') | int(0) %}
          {% set ready = states('input_datetime.ev_session_ready_by') %}

          {% if ready in ['unknown', 'unavailable', ''] %}
            unknown
          {% else %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set now_hour_ts = as_timestamp(now().replace(minute=0, second=0, microsecond=0)) %}
            {% set ns = namespace(candidates=[], hours=[]) %}

            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% if start_ts is not none and start_ts >= now_hour_ts and start_ts < ready_ts %}
                {% set ns.candidates = ns.candidates + [((item.price | float(999)), as_datetime(item.start).strftime('%H:00'))] %}
              {% endif %}
            {% endfor %}

            {% set sorted = ns.candidates | sort %}
            {% set chosen = sorted[:need] %}

            {% for item in chosen %}
              {% set ns.hours = ns.hours + [item[1]] %}
            {% endfor %}

            {{ ns.hours | join(', ') }}
          {% endif %}

      - name: "EV Plan Preview Real"
        unique_id: ev_plan_preview_real
        state: >
          {% set today = state_attr('sensor.stromligning_current_price_vat', 'prices') or [] %}
          {% set tomorrow = state_attr('binary_sensor.stromligning_tomorrow_available_vat', 'prices') or [] %}
          {% set prices = today + tomorrow %}
          {% set need = states('sensor.ev_remaining_hours_needed') | float(0) | round(0, 'ceil') | int(0) %}
          {% set ready = states('input_datetime.ev_planned_ready_by') %}

          {% if need == 0 %}
            🔋 Klar
          {% elif ready in ['unknown', 'unavailable', ''] %}
            ⏱ Ingen deadline
          {% else %}
            {% set ready_ts = as_timestamp(ready) %}
            {% set now_hour_ts = as_timestamp(now().replace(minute=0, second=0, microsecond=0)) %}
            {% set ns = namespace(candidates=[], hours=[]) %}

            {% for item in prices %}
              {% set start_ts = as_timestamp(item.start) %}
              {% if start_ts is not none and start_ts >= now_hour_ts and start_ts < ready_ts %}
                {% set ns.candidates = ns.candidates + [((item.price | float(999)), as_datetime(item.start).strftime('%H:00'))] %}
              {% endif %}
            {% endfor %}

            {% set sorted = ns.candidates | sort %}
            {% set chosen = sorted[:need] %}

            {% for item in chosen %}
              {% set ns.hours = ns.hours + [item[1]] %}
            {% endfor %}

            {{ ns.hours | join(', ') }}
          {% endif %}
          
      - name: "Grid Export Power Smoothed"
        unique_id: grid_export_power_smoothed
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.grid_export_power_average_2m') | float(0) | round(2) }}
          
      - name: "Grid Export Power Average 2m Safe"
        unique_id: grid_export_power_average_2m_safe
        unit_of_measurement: "kW"
        state: >
          {{ states('sensor.grid_export_power_average_2m') | float(0) | round(2) }}      


